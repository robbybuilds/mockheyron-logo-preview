<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heyron Launchpad Flow</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
:root {
  --bg-page: #0C0F14; --bg-panel: #161B23; --bg-panel-2: #1E232C;
  --border-muted: #232A33; --border-strong: #3F3F46;
  --accent: #22D3EE; --accent-soft: rgba(34, 211, 238, 0.08); --accent-edge: rgba(34, 211, 238, 0.40);
  --text-primary: #F5F0E8; --text-secondary: #A1A1AA; --text-tertiary: #71717A; --text-on-accent: #0C0F14;
  --status-success: #34D399; --status-error: #DC2626;
  --r-sm: 8px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-page); color: var(--text-primary); font-family: 'Inter', system-ui, -apple-system, sans-serif; font-feature-settings: 'cv02','cv03','cv04','cv11'; -webkit-font-smoothing: antialiased; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
code { font-family: 'JetBrains Mono', SFMono-Regular, Menlo, monospace; font-size: 0.9em; background: var(--bg-panel-2); padding: 1px 6px; border-radius: 4px; color: var(--accent); }

.app { max-width: 720px; margin: 0 auto; padding: 32px 16px 120px; position: relative; min-height: 100vh; }
.placeholder-note { background: var(--accent-soft); border: 0.5px dashed var(--accent-edge); border-radius: var(--r-md); padding: 10px 14px; font-size: 12px; color: var(--accent); margin-bottom: 16px; line-height: 1.5; }
.panel { border: 0.5px solid var(--border-muted); border-radius: var(--r-xl); padding: 32px 28px 24px; }

.brand { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; }
.brand-name { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
.brand-dot { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }

h1.headline { font-size: 26px; font-weight: 500; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 8px; }
p.sub { font-size: 15px; color: var(--text-secondary); line-height: 1.5; }

.hero { display: flex; align-items: center; gap: 24px; margin-bottom: 28px; }
.hero-text { flex: 1; }

.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 20px; display: flex; flex-direction: column; }
.card.recommended { border: 1px solid var(--accent); }
.card-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
.card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 18px; flex: 1; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: var(--r-md); border: none; transition: background 120ms ease; width: 100%; }
.btn-primary { background: var(--accent); color: var(--text-on-accent); }
.btn-primary:hover:not(:disabled) { background: #5EEADB; }
.btn-ghost { background: transparent; color: var(--text-primary); border: 0.5px solid var(--border-strong); }
.btn-ghost:hover { background: var(--bg-panel-2); }
.btn-link { background: transparent; color: var(--accent); padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--accent-edge); border-radius: var(--r-sm); width: auto; }
.btn-link:hover { background: var(--accent-soft); }
.btn-text { background: transparent; color: var(--accent); border: none; padding: 6px 8px; width: auto; font-size: 13px; }
.btn-text:hover { text-decoration: underline; }
.btn-sm { padding: 8px 14px; font-size: 12px; width: auto; flex-shrink: 0; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.pill { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 0.5px solid var(--accent-edge); color: var(--accent); font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-bottom: 14px; align-self: flex-start; }
.pill-spacer { height: 22px; margin-bottom: 14px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.field-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
.input { width: 100%; padding: 10px 12px; background: var(--bg-panel); color: var(--text-primary); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); font-size: 14px; outline: none; transition: border-color 120ms ease, box-shadow 120ms ease; }
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-edge); }
textarea.input { resize: vertical; min-height: 80px; line-height: 1.5; }
select.input { appearance: none; -webkit-appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--text-secondary) 50%), linear-gradient(135deg, var(--text-secondary) 50%, transparent 50%); background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 32px; }

.foot { font-size: 12px; color: var(--text-tertiary); text-align: center; margin-top: 20px; }
.steps { display: flex; gap: 4px; margin-bottom: 24px; }
.step { flex: 1; height: 3px; background: var(--border-muted); border-radius: 2px; transition: background 200ms; }
.step.active { background: var(--accent); }
.step.done { background: var(--accent); opacity: 0.4; }

.options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.options-rich { grid-template-columns: 1fr 1fr; gap: 10px; }
.option { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 16px; cursor: pointer; transition: border-color 120ms ease; text-align: left; color: inherit; }
.option:hover { border-color: var(--border-strong); }
.option.selected { border: 1px solid var(--accent); }
.option-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.option-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.option-tag { font-size: 10px; color: var(--accent); background: var(--accent-soft); padding: 2px 6px; border-radius: 4px; font-weight: 500; }

.options-list { display: flex; flex-direction: column; gap: 10px; }
.options-list .option { display: flex; gap: 12px; align-items: center; }
.options-list .option-body { flex: 1; }
.option-mark { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border-strong); flex-shrink: 0; position: relative; transition: border-color 120ms; }
.options-list .option.selected .option-mark { border-color: var(--accent); }
.options-list .option.selected .option-mark::after { content: ''; position: absolute; inset: 4px; background: var(--accent); border-radius: 50%; }

.persona-card { padding: 18px; }
.persona-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.persona-tag { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.persona-sample { font-size: 12px; color: var(--text-primary); background: var(--bg-panel-2); padding: 10px 12px; border-radius: var(--r-sm); margin-bottom: 10px; line-height: 1.5; font-style: italic; border-left: 2px solid var(--accent); }
.persona-best { font-size: 11px; color: var(--text-tertiary); }
.persona-best strong { color: var(--text-secondary); font-weight: 500; }

.comm-sample { font-size: 13px; color: var(--text-primary); background: var(--bg-panel-2); padding: 10px 12px; border-radius: var(--r-sm); margin-top: 10px; line-height: 1.5; font-style: italic; border-left: 2px solid var(--accent); }

.usecase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.usecase { display: flex; align-items: center; gap: 10px; background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); padding: 12px; cursor: pointer; color: inherit; text-align: left; transition: border-color 120ms; width: 100%; }
.usecase:hover { border-color: var(--border-strong); }
.usecase.selected { border-color: var(--accent); }
.usecase-check { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border-strong); flex-shrink: 0; position: relative; transition: all 120ms; }
.usecase.selected .usecase-check { background: var(--accent); border-color: var(--accent); }
.usecase.selected .usecase-check::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: 2px solid var(--text-on-accent); border-top: 0; border-left: 0; transform: rotate(45deg); }
.usecase-label { font-size: 13px; flex: 1; }

.soul-note { background: var(--accent-soft); border: 0.5px solid var(--accent-edge); border-radius: var(--r-md); padding: 12px 14px; margin-top: 18px; font-size: 12px; color: var(--accent); line-height: 1.5; }
.soul-note strong { color: var(--text-primary); font-weight: 500; }

.actions { display: flex; gap: 12px; margin-top: 28px; align-items: center; }
.actions .btn { flex: 1; }
.actions .btn-back { flex: 0 0 auto; width: auto; padding: 10px 18px; }
.actions .btn-skip { flex: 0 0 auto; width: auto; padding: 10px 18px; }

/* Setup forms */
.setup { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 18px; }
.setup-step { display: flex; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid var(--border-muted); }
.setup-step:last-child { border-bottom: 0; padding-bottom: 0; }
.setup-step:first-child { padding-top: 0; }
.setup-num { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-panel-2); color: var(--text-secondary); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.setup-step.done .setup-num { background: var(--accent); color: var(--text-on-accent); }
.setup-step-body { flex: 1; min-width: 0; }
.setup-step-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.setup-step-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
.setup-step-action { margin-top: 10px; }

.setup-cta { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 18px; font-size: 14px; font-weight: 500; border-radius: var(--r-md); width: 100%; background: var(--bg-panel-2); color: var(--text-primary); border: 0.5px solid var(--border-strong); cursor: pointer; transition: all 120ms; }
.setup-cta:hover { border-color: var(--accent-edge); background: var(--bg-panel); }
.setup-cta:disabled { opacity: 0.5; cursor: not-allowed; }
.setup-status { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: var(--accent-soft); border: 0.5px solid var(--accent-edge); border-radius: var(--r-md); font-size: 13px; color: var(--accent); }

.voice-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.voice { padding: 12px; background: var(--bg-page); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); cursor: pointer; text-align: left; color: inherit; transition: border-color 120ms; position: relative; }
.voice:hover { border-color: var(--border-strong); }
.voice.selected { border-color: var(--accent); }
.voice-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
.voice-desc { font-size: 11px; color: var(--text-tertiary); }
.voice-play { font-size: 10px; color: var(--accent); cursor: pointer; padding: 2px 6px; border: 0.5px solid var(--accent-edge); border-radius: 4px; background: transparent; }

.permissions { display: flex; flex-direction: column; gap: 0; }
.permissions .toggle-row { padding: 12px 0; }
.permissions .toggle-row:first-child { padding-top: 4px; }
.permissions .toggle-row:last-child { padding-bottom: 4px; }

.skip-hint { font-size: 12px; color: var(--text-tertiary); text-align: center; margin-top: 14px; }

/* Beginner integration list */
.integrations { display: flex; flex-direction: column; gap: 8px; }
.integration { display: flex; align-items: center; gap: 12px; background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); padding: 14px; transition: border-color 120ms; }
.integration.connected { border-color: var(--accent); }
.integration-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--bg-panel-2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--accent); flex-shrink: 0; letter-spacing: 0.04em; }
.integration-body { flex: 1; min-width: 0; }
.integration-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; color: var(--text-primary); }
.integration-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.45; }

.checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 14px; font-size: 13px; color: var(--text-secondary); background: none; border: none; padding: 0; text-align: left; width: 100%; }
.checkbox-mark { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border-strong); position: relative; flex-shrink: 0; transition: all 120ms; }
.checkbox.checked .checkbox-mark { background: var(--accent); border-color: var(--accent); }
.checkbox.checked .checkbox-mark::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: 2px solid var(--text-on-accent); border-top: 0; border-left: 0; transform: rotate(45deg); }

.toggle-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 0.5px solid var(--border-muted); }
.toggle-row:last-child { border-bottom: 0; }
.toggle-info { flex: 1; }
.toggle-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.toggle-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border-muted); position: relative; cursor: pointer; flex-shrink: 0; transition: background 160ms; border: none; padding: 0; margin-top: 2px; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px; background: var(--text-primary); border-radius: 50%; transition: transform 160ms; }
.toggle.on::after { background: var(--text-on-accent); transform: translateX(16px); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.day-row { display: flex; gap: 6px; margin-top: 8px; }
.day { flex: 1; padding: 10px 4px; font-size: 12px; background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-sm); cursor: pointer; text-align: center; color: var(--text-secondary); transition: all 120ms; }
.day:hover { border-color: var(--border-strong); }
.day.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

.summary { display: flex; flex-direction: column; gap: 0; background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); }
.summary-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 16px; border-bottom: 0.5px solid var(--border-muted); font-size: 13px; gap: 12px; }
.summary-row:last-child { border-bottom: 0; }
.summary-section-title { font-size: 11px; color: var(--accent); padding: 10px 16px 6px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
.summary-label { color: var(--text-secondary); flex-shrink: 0; }
.summary-value { color: var(--text-primary); font-weight: 500; text-align: right; }

/* Dashboard */
.dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.dash-greeting h2 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.dash-greeting p { font-size: 13px; color: var(--text-secondary); }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.metric { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 16px; }
.metric-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-trend { font-size: 11px; color: var(--status-success); margin-top: 4px; }
.dash-section { margin-top: 22px; }
.dash-section h3 { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--text-secondary); }
.activity { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); }
.activity-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid var(--border-muted); font-size: 13px; }
.activity-row:last-child { border-bottom: 0; }
.activity-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.activity-text { flex: 1; }
.activity-time { font-size: 11px; color: var(--text-tertiary); }

.container-card { background: var(--bg-panel); border: 0.5px solid var(--accent-edge); border-radius: var(--r-lg); padding: 16px; margin-top: 22px; }
.container-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.container-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
.container-status { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 5px; }
.container-status::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
.container-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; font-size: 12px; }
.container-meta-label { color: var(--text-tertiary); }
.container-meta-value { color: var(--text-primary); font-family: 'JetBrains Mono', SFMono-Regular, Menlo, monospace; font-size: 11px; }

/* Help pages */
.help-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.help-card { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 18px; cursor: pointer; transition: border-color 120ms; text-align: left; color: inherit; display: flex; flex-direction: column; gap: 6px; }
.help-card:hover { border-color: var(--accent-edge); }
.help-card-title { font-size: 15px; font-weight: 500; }
.help-card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.help-back { background: transparent; border: none; color: var(--text-secondary); font-size: 13px; padding: 0; margin-bottom: 16px; cursor: pointer; }
.help-back:hover { color: var(--accent); }
.help-h1 { font-size: 28px; font-weight: 500; margin-bottom: 8px; letter-spacing: -0.01em; }
.help-tagline { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
.help-cat-title { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }
.help-section { margin-bottom: 24px; }
.help-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 10px; }
.help-section p { font-size: 14px; color: var(--text-primary); line-height: 1.65; margin-bottom: 8px; }
.help-section ul, .help-section ol { padding-left: 0; list-style: none; }
.help-section li { font-size: 14px; color: var(--text-primary); line-height: 1.65; margin-bottom: 8px; padding-left: 18px; position: relative; }
.help-section ul li::before { content: '•'; color: var(--accent); position: absolute; left: 4px; top: 0; }
.help-section ol { counter-reset: step; }
.help-section ol li { padding-left: 32px; counter-increment: step; }
.help-section ol li::before { content: counter(step); color: var(--accent); background: var(--accent-soft); border: 0.5px solid var(--accent-edge); border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; left: 0; top: 4px; font-weight: 500; position: absolute; }
.help-related { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 16px; margin-top: 24px; }
.help-related-title { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
.help-related a { display: block; font-size: 13px; color: var(--accent); padding: 8px 0; border-bottom: 0.5px solid var(--border-muted); cursor: pointer; }
.help-related a:last-child { border-bottom: 0; }
.help-related a:hover { padding-left: 4px; transition: padding-left 120ms; }
.help-cta { background: var(--bg-panel); border: 0.5px solid var(--accent-edge); border-radius: var(--r-lg); padding: 16px; margin-top: 18px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
.help-cta-text { font-size: 13px; color: var(--text-secondary); flex: 1; }

/* Support widget */
.sw-pill { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--bg-panel); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 120ms ease; z-index: 100; padding: 0; }
.sw-pill:hover { transform: scale(1.05); }
.sw-panel { position: fixed; bottom: 24px; right: 24px; width: 360px; height: 480px; max-height: calc(100vh - 48px); background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); display: flex; flex-direction: column; z-index: 100; overflow: hidden; animation: sw-open 180ms ease-out; transform-origin: bottom right; }
@keyframes sw-open { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.sw-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 0.5px solid var(--border-muted); }
.sw-header-info { display: flex; align-items: center; gap: 10px; }
.sw-header-name { font-size: 13px; font-weight: 500; }
.sw-header-status { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
.sw-status-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; }
.sw-close { background: transparent; color: var(--text-tertiary); border: none; font-size: 22px; line-height: 1; width: 24px; height: 24px; padding: 0; }
.sw-close:hover { color: var(--text-primary); }
.sw-messages { flex: 1; padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

/* GITHUB — full setup */
function GitHubSetup({ data, onUpdate, onNext, onBack, step, totalSteps }) {
  const [authMethod, setAuthMethod] = useState(data.githubAuthMethod || null);
  const [authed, setAuthed] = useState(data.githubAuthed || false);
  const [pat, setPat] = useState(data.githubPat || '');
  const [account, setAccount] = useState(data.githubAccount || 'cassielee');
  const [repos, setRepos] = useState(data.githubRepos || []);
  const [perms, setPerms] = useState(data.githubPerms || { readCode: true, readPRs: true, writeCommits: false, mergePRs: false });
  const [tested, setTested] = useState(false);
  const [testing, setTesting] = useState(false);
  const REPOS = ['heyron-app', 'heyron-api', 'heyron-docs', 'heyron-mobile', 'heyron-marketing'];
  const ACCOUNTS = ['cassielee (personal)', 'heyron-team (org)'];
  const authComplete = (authMethod === 'oauth' && authed) || (authMethod === 'pat' && pat.length >= 10);
  const valid = authComplete && repos.length > 0 && tested;
  const test = () => { setTesting(true); setTimeout(() => { setTesting(false); setTested(true); }, 800); };
  const handleConnect = () => { onUpdate({ tools: Array.from(new Set([...data.tools, 'github'])), githubAuthMethod: authMethod, githubAuthed: authed, githubPat: pat ? '••••••••' : '', githubAccount: account, githubRepos: repos, githubPerms: perms }); onNext(); };
  return (
    <IntegrationStep name="GitHub" desc="Push commits, review PRs, and let your agent ship code without leaving chat." step={step} totalSteps={totalSteps} onBack={onBack} onSkip={onNext} onConnect={handleConnect} connected={data.tools.includes('github')} canConnect={valid}>
      <div className="setup">
        <SetupRow num="1" title="Choose how to connect" desc="OAuth is easiest. Personal Access Token is best if you need fine-grained scopes.">
          <div className="chip-row">
            <button className={`chip ${authMethod === 'oauth' ? 'selected' : ''}`} onClick={() => setAuthMethod('oauth')}>OAuth</button>
            <button className={`chip ${authMethod === 'pat' ? 'selected' : ''}`} onClick={() => setAuthMethod('pat')}>Personal Access Token</button>

        </SetupRow>
        {authMethod === 'oauth' && (
          <SetupRow num="2" title="Sign in with GitHub" desc="We'll redirect you to GitHub. Approve the Heyron app and come back here." done={authed}>
            {!authed ? (<button className="setup-cta" onClick={() => setAuthed(true)}><svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M12 .3a12 12 0 0 0-3.79 23.4c.6.1.83-.26.83-.58v-2.04c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.08-.74.08-.73.08-.73 1.2.09 1.83 1.24 1.83 1.24 1.07 1.83 2.81 1.3 3.5.99.1-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18a4.65 4.65 0 0 1 1.24 3.22c0 4.61-2.81 5.62-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.58A12 12 0 0 0 12 .3"/></svg>Continue with GitHub</button>) : (<StatusOK>Signed in as <strong style={{ color: 'var(--accent)', marginLeft: 4 }}>@cassielee</strong></StatusOK>)}
          </SetupRow>
        )}
        {authMethod === 'pat' && (
          <SetupRow num="2" title="Generate a token" desc={<>Open <code>github.com/settings/tokens</code> → Generate new token (classic) → tick <code>repo</code>, <code>read:org</code>, <code>read:user</code>. Copy and paste below.</>} done={pat.length >= 10}>
            <button className="setup-cta" onClick={() => window.open('https://github.com/settings/tokens/new?scopes=repo,read:org,read:user&description=Heyron', '_blank')} style={{ marginBottom: 10 }}>Open GitHub token settings</button>
            <input className="input" type="password" value={pat} onChange={(e) => setPat(e.target.value)} placeholder="ghp_..." />
          </SetupRow>
        )}
        {authComplete && (
          <SetupRow num="3" title="Pick an account or org">
            <select className="input" value={account} onChange={(e) => setAccount(e.target.value)}>{ACCOUNTS.map(a => <option key={a}>{a}</option>)}</select>

        {authComplete && (
          <SetupRow num="4" title="Pick repos to connect" desc="You can add more later from Settings → Connections." done={repos.length > 0}>
            <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>
              {REPOS.map(r => (<button key={r} className={`usecase ${repos.includes(r) ? 'selected' : ''}`} onClick={() => setRepos(p => p.includes(r) ? p.filter(x => x !== r) : [...p, r])}><div className="usecase-check" /><div className="usecase-label">{r}</div></button>))}
            </div>
          </SetupRow>
        )}
        {repos.length > 0 && (
          <SetupRow num="5" title="What can your agent do?" desc="You can change permissions any time.">
            <div className="permissions">
              <div className="toggle-row"><div className="toggle-info"><p className="toggle-title">Read code</p><p className="toggle-desc">Browse repo contents, files, and history.</p></div><button className={`toggle ${perms.readCode ? 'on' : ''}`} onClick={() => setPerms(p => ({...p, readCode: !p.readCode}))} aria-label="toggle"/></div>

              <div className="toggle-row"><div className="toggle-info"><p className="toggle-title">Merge PRs</p><p className="toggle-desc">Sensitive — only enable if you trust your agent to ship.</p></div><button className={`toggle ${perms.mergePRs ? 'on' : ''}`} onClick={() => setPerms(p => ({...p, mergePRs: !p.mergePRs}))} aria-label="toggle"/></div>
            </div>
          </SetupRow>
        )}
        {repos.length > 0 && (
          <SetupRow num="6" title="Test the connection" done={tested}>
            {tested ? (<StatusOK>Verified. Latest commit on <code>{repos[0]}</code>: 14 minutes ago.</StatusOK>) : (<button className="setup-cta" onClick={test} disabled={testing}>{testing ? 'Testing…' : 'Test connection'}</button>)}
          </SetupRow>
        )}
      </div>
    </IntegrationStep>
  );
}

        {tier && (
          <SetupRow num={domains === 'allowlist' ? '4' : '3'} title="Block these domains" desc="Always blocked, even if explicitly requested.">
            <textarea className="input" value={blocklist} onChange={(e) => setBlocklist(e.target.value)} placeholder="mybank.com, irs.gov, hr-portal.company.com" rows={2} />

          <SetupRow num={domains === 'allowlist' ? '5' : '4'} title="Session limits">

}

function PreviewScreen({ data, onUpdate, onLaunch, onBack, step, totalSteps, expert }) {

  return (
    <div className="panel">

        {comm && <div className="summary-row"><span className="summary-label">Verbosity</span><span className="summary-value">{comm.name}</span></div>}

        {expert && (model || memory) && (<><div className="summary-section-title">Brain</div>
        {expert && model && <div className="summary-row"><span className="summary-label">Model</span><span className="summary-value">{model.name}</span></div>}
        {expert && memory && <div className="summary-row"><span className="summary-label">Memory</span><span className="summary-value">{memory.name}</span></div>}</>)}

        <div className="summary-section-title">Connections</div>
        <div className="summary-row"><span className="summary-label">Tools connected</span><span className="summary-value" style={{ maxWidth: '60%' }}>{data.tools.length === 0 ? 'None yet' : data.tools.join(', ')}</span></div>

        {expert && (<><div className="summary-section-title">Schedule & alerts</div>
        <div className="summary-row"><span className="summary-label">Working hours</span><span className="summary-value">{data.workStart}–{data.workEnd}, {data.workDays.length} days</span></div>
        <div className="summary-row"><span className="summary-label">Notifications</span><span className="summary-value">{[data.notifyEmail && 'Email', data.notifyPush && 'Push'].filter(Boolean).join(' + ') || 'Off'}</span></div></>)}
      </div>
      <div className="warning-box"><strong>Final acknowledgement:</strong> Your agent may remember what you provide and may use connected tools based on the access you grant. Do not paste secrets unless you intend to store them. You can change settings later, but launch means you understand what you configured.</div>

  );
}

const ESCALATE_KEYWORDS = ['billing','refund','cancel','outage','data loss','security','breach','urgent','emergency','production down','human','support team','real person','ticket','can\'t access','locked out'];
const TOOL_LABELS = { github: 'GitHub', telegram: 'Telegram', apify: 'Apify', elevenlabs: 'ElevenLabs', obsidian: 'Obsidian', discord: 'Discord', cron: 'Cron', browser: 'Web Browser' };
function buildFAQ(data) {
  const tools = data.tools || [];
  const installedList = tools.length ? tools.map(t => TOOL_LABELS[t] || t).join(', ') : 'nothing yet';
  return [
    { match: /(what|which).{0,30}(installed|connected|integration)|installed|integrations? do I have/i,
      reply: tools.length ? `Looking at your container — ${tools.length} active: ${installedList}. Want a status check on any?` : 'No integrations connected yet. Settings → Connections to add some.',
      investigate: true },
    { match: /cancel.{0,30}(account|subscription|plan)?|how (do|can) I cancel|stop my (subscription|plan)|delete my account/i,
      reply: "Sad to see you go. Here's how cancellation works — full guide on what happens to your data, when billing stops, and how to reactivate.",
      action: { type: 'help', slug: 'cancel', label: 'Open cancellation guide →' } },
    { match: /refund|money back|charge back/i,
      reply: "Refund requests go through a tracked form. The guide covers eligibility, processing time, and what's not refundable.",
      action: { type: 'help', slug: 'refund', label: 'Open refund guide →' } },
    { match: /log|crash|broken|not working|error|stuck|failed/i,
      reply: "Pulling your container logs… agent process restarted twice in the last hour. Looks like rate-limit pressure on one of your integrations. I've backed off the polling — should settle. Want the troubleshooting guide for next time?",
      investigate: true,
      action: { type: 'help', slug: 'troubleshooting', label: 'Open troubleshooting guide →' } },
    { match: /(what is|explain|tell me about) (the )?soul|soul vs memory|memory vs soul/i,
      reply: "Soul is your agent's identity (focus areas, personality, voice). Memory is what it knows (facts, history). Soul is small and intentional, memory grows over time.",
      action: { type: 'help', slug: 'soul-memory', label: 'Read the full breakdown →' } },
    { match: /what.{0,15}(can|do).{0,15}(you|ron).{0,15}see|container access|privacy/i,
      reply: "I have read access to your container — I can see integrations, logs, settings. I can't see your tokens or message content.",
      action: { type: 'help', slug: 'container-access', label: 'Read what Ron can see →' } },
    { match: /soul|priorit|focus/i, reply: `Your soul is set to focus on: ${(data.useCases || []).join(', ') || 'nothing yet'}. Settings → Soul to edit.` },
    { match: /personality|persona/i, reply: "Settings → Soul → Personality. Or just tell me which persona — I'll switch it in your container right now." },
    { match: /memory|forget|remember/i, reply: "Memory lives at Settings → Memory. Looking at your container — 142 entries stored. Want me to walk through cleanup?", investigate: true },
    { match: /model|gpt|llm|switch model/i, reply: `Settings → Model. I see you're on ${(MODELS.find(m => m.id === data.model) || {}).name || 'Heyron Standard'} right now. Switch is instant.` },
    { match: /tool|integration|connect/i, reply: `Settings → Connections. Your container has ${tools.length} integrations active. What do you want to add or troubleshoot?` },
    { match: /log|crash|broken|not working|error|stuck/i, reply: "Checking your container... agent process restarted twice in the last hour. Looks like rate-limit pressure on one of your integrations. I've backed off the polling — should settle. Want the full stack trace?", investigate: true },
    { match: /restart|reboot/i, reply: "Restarting your agent in the container now. Give it 5 seconds.", investigate: true },
    { match: /github|git/i, reply: tools.includes('github') ? "GitHub is live in your container. Last sync 14 minutes ago. Want recent activity?" : "GitHub isn't connected yet. Settings → Connections to add it." , investigate: tools.includes('github') },
    { match: /telegram/i, reply: tools.includes('telegram') ? "Telegram is connected. Last 3 messages routed through fine." : "Telegram isn't connected yet. Settings → Connections to add @HeyronBot." },
    { match: /discord/i, reply: "Heyron Discord lives at discord.gg/heyron — happy to drop you the invite link." },
    { match: /cron|schedule task|recurring/i, reply: tools.includes('cron') ? "You have 1 cron job running in your container. Settings → Cron to add more." : "No scheduled tasks running yet. Settings → Cron to set one up." },
    { match: /elevenlabs|voice/i, reply: tools.includes('elevenlabs') ? "ElevenLabs is connected. Voice is set. Settings → Voice to swap." : "ElevenLabs isn't connected. Settings → Connections to add it." },
    { match: /apify|scrape/i, reply: tools.includes('apify') ? "Apify token looks healthy. Last scrape 2h ago, no errors." : "Apify isn't connected. Drop in your token at Settings → Connections.", investigate: tools.includes('apify') },
    { match: /obsidian|vault|notes/i, reply: tools.includes('obsidian') ? "Obsidian vault sync is healthy. Last sync 3 minutes ago." : "Obsidian isn't connected. Settings → Connections to point at your vault.", investigate: tools.includes('obsidian') },
    { match: /browser|web browser/i, reply: tools.includes('browser') ? "Browser tool active. 7 sessions today, all clean." : "Browser tool isn't enabled. Settings → Connections to turn it on." },
    { match: /name|rename/i, reply: "Settings → Profile, or tell me the new name and I'll update your container directly." },
    { match: /hours|schedule|timezone/i, reply: `Settings → Schedule. You're set to ${data.workStart || '9:00'}–${data.workEnd || '18:00'} ${data.timezone || 'PT'}, ${(data.workDays || []).length} days a week.` },
    { match: /privacy|delete/i, reply: `Settings → Privacy. Auto-delete is ${data.autoDelete === 'Never' || !data.autoDelete ? 'off' : data.autoDelete.toLowerCase()} — want me to change it?` },
    { match: /notification|push/i, reply: `Settings → Notifications. Email is ${data.notifyEmail ? 'on' : 'off'}, push is ${data.notifyPush ? 'on' : 'off'}.` },
    { match: /container|env|environment/i, reply: "Your container is healthy: 2.1/4.0GB memory, 14d 3h uptime, region us-east-1.", investigate: true },
    { match: /hello|^hi$|^hey$/i, reply: "Hey! I've got your container open. What's up?" },
  ];
}
function shouldEscalate(text, turnCount) { const lc = text.toLowerCase(); if (ESCALATE_KEYWORDS.some((k) => lc.includes(k))) return true; if (turnCount >= 5) return true; return false; }
function findReply(text, faq) { const match = faq.find((f) => f.match.test(text)); return match || { reply: "Hmm, I don't know that one. Try rephrasing, or open a ticket and the team will pick it up." }; }

function SupportWidget({ userEmail, userData, onNavigateHelp }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([{ from: 'bot', text: "Hey, I'm Ron. I've got access to your container, so I can actually look things up and fix stuff. What's up?" }]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [investigating, setInvestigating] = useState(false);
  const [escalateOffered, setEscalateOffered] = useState(false);
  const [showTicket, setShowTicket] = useState(false);
  const [toast, setToast] = useState(null);
  const messagesRef = useRef(null);
  useEffect(() => { if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight; }, [messages, typing, investigating]);
  const userTurns = messages.filter((m) => m.from === 'user').length;
  const FAQ = buildFAQ(userData || {});
  const send = (forceText) => {
    const userMsg = (forceText !== undefined ? forceText : input).trim();
    if (!userMsg) return;
    setMessages((m) => [...m, { from: 'user', text: userMsg }]);
    if (forceText === undefined) setInput('');
    const escalate = shouldEscalate(userMsg, userTurns + 1);
    if (escalate && !escalateOffered) { setTyping(true); setTimeout(() => { setTyping(false); setMessages((m) => [...m, { from: 'bot', text: "This one's beyond my container access — let me hand you to the team." }, { from: 'bot', kind: 'action', action: { type: 'ticket', label: 'Open a ticket →' } }]); setEscalateOffered(true); }, 800); return; }
    const found = findReply(userMsg, FAQ);
    const showReply = () => { const next = [{ from: 'bot', text: found.reply }]; if (found.action) next.push({ from: 'bot', kind: 'action', action: found.action }); setMessages((m) => [...m, ...next]); };
    if (found.investigate) { setInvestigating(true); setTimeout(() => { setInvestigating(false); setTyping(true); setTimeout(() => { setTyping(false); showReply(); }, 600); }, 1100); }
    else { setTyping(true); setTimeout(() => { setTyping(false); showReply(); }, 700 + Math.random() * 300); }
  };
  const handleQuickAction = (qa) => { if (qa.kind === 'ticket') { setShowTicket(true); return; } send(qa.text); };
  const handleAction = (action) => { if (action.type === 'link') { window.open(action.url, '_blank', 'noopener'); } else if (action.type === 'ticket') { setShowTicket(true); } else if (action.type === 'help' && onNavigateHelp) { onNavigateHelp(action.slug); setOpen(false); } };
  const showQuickActions = userTurns === 0 && !typing && !investigating;
  const submitTicket = (ticket) => { setShowTicket(false); const id = Math.floor(1000 + Math.random() * 9000); setToast(`Ticket #${id} sent. We'll email you within a day.`); setMessages((m) => [...m, { from: 'bot', text: `Ticket #${id} is in. Container snapshot attached. You're good — go take a break.` }]); setTimeout(() => setToast(null), 4000); console.log('TICKET PAYLOAD:', ticket); };
  return (
    <>
      {!open ? (<button className="sw-pill" onClick={() => setOpen(true)} aria-label="Open support chat with Ron"><HeadMascot size={32} /></button>) : (
        <div className="sw-panel" role="dialog" aria-labelledby="sw-title">
          <div className="sw-header"><div className="sw-header-info"><HeadMascot size={26} /><div><p className="sw-header-name" id="sw-title">Hey Ron</p><p className="sw-header-status"><span className="sw-status-dot" /> Online · container linked</p></div></div><button className="sw-close" onClick={() => setOpen(false)} aria-label="Close chat">×</button></div>
          <div className="sw-messages" ref={messagesRef} aria-live="polite">
            {messages.map((m, i) => {
              if (m.kind === 'escalate-cta') return (<div key={i} className="bubble escalate-cta"><button className="btn btn-link" onClick={() => setShowTicket(true)}>Open a ticket →</button></div>);
              if (m.kind === 'action') return (<button key={i} className="sw-action-btn" onClick={() => handleAction(m.action)}>{m.action.label}</button>);
              return <div key={i} className={`bubble ${m.from}`}>{m.text}</div>;
            })}
            {investigating && <div className="investigating">Checking your container…</div>}
            {typing && (<div className="typing"><span className="typing-dot" /><span className="typing-dot" /><span className="typing-dot" /></div>)}
            {showQuickActions && (
              <div className="sw-quick">
                {QUICK_ACTIONS.map((qa, i) => (<button key={i} className="sw-chip" onClick={() => handleQuickAction(qa)}>{qa.label}</button>))}
              </div>
            )}
          </div>
          <div className="sw-input-row"><input className="input" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && send()} placeholder="Ask anything…" /><button className="sw-send" onClick={send} disabled={!input.trim()}>Send</button></div>
        </div>
      )}
      {showTicket && <TicketModal messages={messages} email={userEmail} onClose={() => setShowTicket(false)} onSubmit={submitTicket} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function TicketModal({ messages, email, onClose, onSubmit }) {
  const transcript = messages.filter((m) => m.from && m.text).map((m) => `${m.from === 'user' ? 'User' : 'Ron'}: ${m.text}`).join('\n');
  const [subject, setSubject] = useState('');
  const [description, setDescription] = useState(`Conversation context:\n${transcript}\n\nContainer snapshot: auto-attached on submit\n\n---\n`);
  const [category, setCategory] = useState('Bug');
  const [priority, setPriority] = useState('normal');
  const [emailValue, setEmail] = useState(email);
  const valid = subject.trim() && description.trim() && emailValue.trim();
  const handleSubmit = () => { if (!valid) return; onSubmit({ subject, description, category, priority, email: emailValue, source: 'in_app_widget', containerSnapshot: true }); };
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Open a ticket</h3>
        <p className="modal-sub">A container snapshot will be attached automatically. The team will email you within a day.</p>
        <div className="field"><label>Subject</label><input className="input" value={subject} onChange={(e) => setSubject(e.target.value)} placeholder="Brief summary…" maxLength={100} autoFocus /></div>
        <div className="field"><label>Description</label><textarea className="input" value={description} onChange={(e) => setDescription(e.target.value)} rows={6} /></div>
        <div className="field"><label>Category</label><select className="input" value={category} onChange={(e) => setCategory(e.target.value)}><option>Account</option><option>Billing</option><option>Integration</option><option>Bug</option><option>Feature request</option><option>Other</option></select></div>
        <div className="field"><label>Priority</label><div className="chip-row">{['low','normal','urgent'].map((p) => (<button key={p} className={`chip ${priority === p ? 'selected' : ''}`} onClick={() => setPriority(p)}>{p[0].toUpperCase() + p.slice(1)}</button>))}</div></div>
        <div className="field"><label>Email</label><input className="input" type="email" value={emailValue} onChange={(e) => setEmail(e.target.value)} /></div>
        <div className="actions"><button className="btn btn-ghost btn-back" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSubmit} disabled={!valid}>Send ticket</button></div>
      </div>
    </div>
  );
}

/* ─── App ────────────────────────────────────────────────────────── */
const BEGINNER_FLOW = ['beginner-names','beginner-usecases','beginner-integrations','beginner-personality','beginner-comm','beginner-about','beginner-preview'];
const EXPERT_FLOW = ['expert-names','expert-usecases','expert-model','expert-pick-tools','expert-github','expert-telegram','expert-apify','expert-elevenlabs','expert-obsidian','expert-discord','expert-cron','expert-browser','expert-memory','expert-personality','expert-comm','expert-hours','expert-notifications','expert-privacy','expert-about','expert-preview'];
const INTEGRATION_TOOL_SLUGS = ['github','telegram','apify','elevenlabs','obsidian','discord','cron','browser'];
const integrationFromScreen = (s) => INTEGRATION_TOOL_SLUGS.find(t => s === `expert-${t}`);

const INITIAL_DATA = {
  email: 'you@heyron.app', yourName: '', agentName: '', aboutSelf: '', launchAck: false,
  useCases: [], personality: null, commStyle: null,
  model: null, tools: [], toSetup: [], memory: null, editableMemory: true,
  timezone: 'Pacific (PT)', workStart: '09:00', workEnd: '18:00', workDays: ['Mon','Tue','Wed','Thu','Fri'],
  notifyEmail: true, notifyPush: false, notifyFreq: 'important',
  learnFromMe: true, shareUsage: true, autoDelete: 'Never',
};

function App() {
  const [screen, setScreen] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('path') === 'dashboard') return 'dashboard';
    return params.get('path') === 'expert' ? 'expert-names' : 'beginner-names';
  });
  const [data, setData] = useState(INITIAL_DATA);
  const update = (patch) => setData((d) => ({ ...d, ...patch }));
  const expertFlow = EXPERT_FLOW.filter(s => { const t = integrationFromScreen(s); return !t || (data.toSetup || []).includes(t); });
  const back = (current) => { const flow = current.startsWith('beginner-') ? BEGINNER_FLOW : current.startsWith('expert-') ? expertFlow : null; if (!flow) { setScreen('beginner-names'); return; } const idx = flow.indexOf(current); setScreen(idx <= 0 ? 'beginner-names' : flow[idx - 1]); };
  const reset = () => { setData(INITIAL_DATA); setScreen('beginner-names'); };
  const totalB = BEGINNER_FLOW.length, totalE = expertFlow.length;
  const stepB = (n) => BEGINNER_FLOW.indexOf(n), stepE = (n) => expertFlow.indexOf(n);
  const returnToMissionControl = () => { window.location.href = 'index.html?launchpad=complete'; };
  const advance = (current) => { const flow = current.startsWith('beginner-') ? BEGINNER_FLOW : expertFlow; const idx = flow.indexOf(current); if (idx >= flow.length - 1) { returnToMissionControl(); return; } setScreen(flow[idx + 1]); };

  return (
    <div className="app">
      {/* Welcome screen removed - hello-screen passes path=beginner|expert */}
      {screen === 'beginner-names' && <NamesScreen data={data} onUpdate={update} onBack={() => back('beginner-names')} onNext={() => advance('beginner-names')} step={stepB('beginner-names')} totalSteps={totalB} />}
      {screen === 'beginner-usecases' && <UseCasesScreen data={data} onUpdate={update} onBack={() => back('beginner-usecases')} onNext={() => advance('beginner-usecases')} step={stepB('beginner-usecases')} totalSteps={totalB} />}
      {screen === 'beginner-integrations' && <IntegrationsListScreen data={data} onUpdate={update} onBack={() => back('beginner-integrations')} onNext={() => advance('beginner-integrations')} step={stepB('beginner-integrations')} totalSteps={totalB} />}
      {screen === 'beginner-personality' && <PersonalityScreen data={data} onUpdate={update} onBack={() => back('beginner-personality')} onNext={() => advance('beginner-personality')} step={stepB('beginner-personality')} totalSteps={totalB} />}
      {screen === 'beginner-comm' && <CommStyleScreen data={data} onUpdate={update} onBack={() => back('beginner-comm')} onNext={() => advance('beginner-comm')} step={stepB('beginner-comm')} totalSteps={totalB} />}
      {screen === 'beginner-about' && <AboutSelfScreen data={data} onUpdate={update} onBack={() => back('beginner-about')} onNext={() => advance('beginner-about')} step={stepB('beginner-about')} totalSteps={totalB} />}
      {screen === 'beginner-preview' && <PreviewScreen data={data} onUpdate={update} onLaunch={returnToMissionControl} onBack={() => back('beginner-preview')} step={stepB('beginner-preview')} totalSteps={totalB} expert={false} />}
      {screen === 'expert-names' && <NamesScreen data={data} onUpdate={update} onBack={() => back('expert-names')} onNext={() => advance('expert-names')} step={stepE('expert-names')} totalSteps={totalE} />}
      {screen === 'expert-usecases' && <UseCasesScreen data={data} onUpdate={update} onBack={() => back('expert-usecases')} onNext={() => advance('expert-usecases')} step={stepE('expert-usecases')} totalSteps={totalE} />}
      {screen === 'expert-model' && <ModelScreen data={data} onUpdate={update} onBack={() => back('expert-model')} onNext={() => advance('expert-model')} step={stepE('expert-model')} totalSteps={totalE} />}
      {screen === 'expert-pick-tools' && <IntegrationsPickScreen data={data} onUpdate={update} onBack={() => back('expert-pick-tools')} onNext={() => advance('expert-pick-tools')} step={stepE('expert-pick-tools')} totalSteps={totalE} />}
      {screen === 'expert-github' && <GitHubSetup data={data} onUpdate={update} onBack={() => back('expert-github')} onNext={() => advance('expert-github')} step={stepE('expert-github')} totalSteps={totalE} />}
      {screen === 'expert-telegram' && <TelegramSetup data={data} onUpdate={update} onBack={() => back('expert-telegram')} onNext={() => advance('expert-telegram')} step={stepE('expert-telegram')} totalSteps={totalE} />}
      {screen === 'expert-apify' && <ApifySetup data={data} onUpdate={update} onBack={() => back('expert-apify')} onNext={() => advance('expert-apify')} step={stepE('expert-apify')} totalSteps={totalE} />}
      {screen === 'expert-elevenlabs' && <ElevenLabsSetup data={data} onUpdate={update} onBack={() => back('expert-elevenlabs')} onNext={() => advance('expert-elevenlabs')} step={stepE('expert-elevenlabs')} totalSteps={totalE} />}
      {screen === 'expert-obsidian' && <ObsidianSetup data={data} onUpdate={update} onBack={() => back('expert-obsidian')} onNext={() => advance('expert-obsidian')} step={stepE('expert-obsidian')} totalSteps={totalE} />}
      {screen === 'expert-discord' && <DiscordSetup data={data} onUpdate={update} onBack={() => back('expert-discord')} onNext={() => advance('expert-discord')} step={stepE('expert-discord')} totalSteps={totalE} />}
      {screen === 'expert-cron' && <CronSetup data={data} onUpdate={update} onBack={() => back('expert-cron')} onNext={() => advance('expert-cron')} step={stepE('expert-cron')} totalSteps={totalE} />}
      {screen === 'expert-browser' && <BrowserSetup data={data} onUpdate={update} onBack={() => back('expert-browser')} onNext={() => advance('expert-browser')} step={stepE('expert-browser')} totalSteps={totalE} />}
      {screen === 'expert-memory' && <MemoryScreen data={data} onUpdate={update} onBack={() => back('expert-memory')} onNext={() => advance('expert-memory')} step={stepE('expert-memory')} totalSteps={totalE} />}
      {screen === 'expert-personality' && <PersonalityScreen data={data} onUpdate={update} onBack={() => back('expert-personality')} onNext={() => advance('expert-personality')} step={stepE('expert-personality')} totalSteps={totalE} />}
      {screen === 'expert-comm' && <CommStyleScreen data={data} onUpdate={update} onBack={() => back('expert-comm')} onNext={() => advance('expert-comm')} step={stepE('expert-comm')} totalSteps={totalE} />}
      {screen === 'expert-hours' && <HoursScreen data={data} onUpdate={update} onBack={() => back('expert-hours')} onNext={() => advance('expert-hours')} step={stepE('expert-hours')} totalSteps={totalE} />}
      {screen === 'expert-notifications' && <NotificationsScreen data={data} onUpdate={update} onBack={() => back('expert-notifications')} onNext={() => advance('expert-notifications')} step={stepE('expert-notifications')} totalSteps={totalE} />}
      {screen === 'expert-privacy' && <PrivacyScreen data={data} onUpdate={update} onBack={() => back('expert-privacy')} onNext={() => advance('expert-privacy')} step={stepE('expert-privacy')} totalSteps={totalE} />}
      {screen === 'expert-about' && <AboutSelfScreen data={data} onUpdate={update} onBack={() => back('expert-about')} onNext={() => advance('expert-about')} step={stepE('expert-about')} totalSteps={totalE} />}
      {screen === 'expert-preview' && <PreviewScreen data={data} onUpdate={update} onLaunch={returnToMissionControl} onBack={() => back('expert-preview')} step={stepE('expert-preview')} totalSteps={totalE} expert={true} />}
      {screen === 'dashboard' && <Dashboard data={data} onReset={reset} onHelp={() => setScreen('help')} onNavigateHelp={(slug) => setScreen(`help-${slug}`)} />}
      {screen === 'help' && <HelpIndex onSelect={(s) => setScreen(`help-${s}`)} onBack={() => setScreen('dashboard')} />}
      {screen.startsWith('help-') && <HelpPage slug={screen.replace('help-', '')} onSelect={(s) => setScreen(`help-${s}`)} onBack={() => setScreen('help')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
