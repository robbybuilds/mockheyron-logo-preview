<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeyRon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #07090c;
      color: #e6f1ff;
    }

    /* HEADER */
    .header {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: #07090c;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 60px;
    }

    .logo span {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-left: 14px;
    }

    .nav-links a {
      color: #aab4c3;
      text-decoration: none;
      margin-left: 30px;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.25s ease;
    }

    .nav-links a:hover {
      color: #22d3ee;
      text-shadow: 0 0 6px rgba(34, 211, 238, 0.6);
    }

    /* TABLE LAYOUT */
    .content-table {
      width: 100%;
      height: 33.66vh;
      table-layout: fixed;
      border-collapse: collapse;
      background: #07090c; /* FIX: unify background to remove white notch */
    }

    .content-table td {
      vertical-align: top;
      background: #07090c; /* FIX: ensure no white bleed */
    }

    /* LEFT TEXT CELL */
    .text-cell {
      width: 45%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .text-cell h2 {
      color: #ffffff;
      margin-bottom: 12px;
    }

    .text-cell p {
      color: #aab4c3;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .button-wrap {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .launch-btn {
      background: #22d3ee;
      color: #07090c;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .launch-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.6);
    }

    .launch-btn:active {
      transform: translateY(0px);
      box-shadow: 0 0 6px rgba(34, 211, 238, 0.4);
    }

    /* RIGHT IMAGE CELL */
    .image-cell {
      width: 55%;
      padding: 0;
    }

    /* ============================================
       === ANIMATION STYLES START (HIGHLIGHTED) ===
       ============================================ */

    .space-scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07090c;
      max-height: 33.33vh;
    }

    .bg {
      position: absolute;
      width: 120%;
      left: -10%;
      bottom: 0;
    }

    .ship {
      position: absolute;
      right: 16%;
      top: 35%;
      width: 285px;
      filter: blur(.5px) brightness(0.90);
      opacity: 0.95;
    }

    /* VIGNETTE */
    .space-scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        circle at center,
        transparent 60%,
        rgba(7, 9, 12, 0.6) 100%
      );
    }

    /* FLOATING RACCOON ANIMATION */
    .raccoon {
      position: absolute;
      left: 20%;
      top: 30%;
      width: 160px;
      animation: floatWander 16s ease-in-out infinite;
    }

    @keyframes floatWander {
      0%   { transform: translate(0px, 0px) rotate(-2deg); }
      20%  { transform: translate(15px, -20px) rotate(2deg); }
      40%  { transform: translate(-10px, -35px) rotate(-1deg); }
      60%  { transform: translate(20px, -15px) rotate(3deg); }
      80%  { transform: translate(-15px, -25px) rotate(-2deg); }
      100% { transform: translate(0px, 0px) rotate(-2deg); }
    }

    /* ============================================
       === ANIMATION STYLES END (HIGHLIGHTED) ===
       ============================================ */

  </style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png" alt="HeyRon Logo">
    <span>HeyRon</span>
  </div>

  <nav class="nav-links">
    <a href="http://Heyron.ai">Home</a>
    <a href="hello-screen.html">Launchpad</a>
    <a href="https://ron-vercel-dashboard.vercel.app/#academy">Ron Academy</a>
  </nav>
</div>

<table class="content-table">
  <tr>

    <td class="text-cell">
      <h2>Welcome Back</h2>
      <p>Mission Control is your signed in home. Your work is connected, Launchpad progress is tracked. Next step: <b>personality!</b></p>

      <div class="button-wrap">
        <button class="launch-btn">Continue Launchpad</button>
      </div>
    </td>

    <td class="image-cell">
      <!-- ============================================
           === ANIMATION BLOCK START (HIGHLIGHTED) ===
           ============================================ -->
      <div class="space-scene">
        <img src="assets/bg-space.png" class="bg">
        <img src="assets/ship.png" class="ship">
        <img src="assets/raccoon.png" class="raccoon">
      </div>
      <!-- ============================================
           === ANIMATION BLOCK END (HIGHLIGHTED) ===
           ============================================ -->
    </td>

  </tr>
</table>

</body>
</html>
