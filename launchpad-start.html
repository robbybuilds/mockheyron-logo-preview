<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Heyron Launchpad Start</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;background:#05070b;color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
.page{min-height:100svh;display:flex;flex-direction:column;background:#05070b}
.topbar{position:fixed;z-index:5;top:calc(12px + env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));right:max(12px,env(safe-area-inset-right));display:flex;justify-content:space-between;gap:10px;pointer-events:none}
.topbar a{pointer-events:auto;color:#D7F9FF;text-decoration:none;border:1px solid rgba(125,225,255,.28);background:rgba(7,9,12,.52);backdrop-filter:blur(10px);border-radius:999px;padding:10px 12px;font-size:12px;min-height:44px;display:flex;align-items:center;max-width:48%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.art-wrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;padding:calc(58px + env(safe-area-inset-top)) 0 calc(64px + env(safe-area-inset-bottom));overflow:hidden}
.art-link{position:relative;display:block;width:100vw;height:calc(100svh - 122px - env(safe-area-inset-top) - env(safe-area-inset-bottom));min-height:520px;text-decoration:none;-webkit-tap-highlight-color:rgba(34,211,238,.18);cursor:pointer}
.art-link img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;border:0}
.art-link:focus-visible{outline:3px solid rgba(34,211,238,.8);outline-offset:-6px;border-radius:18px}
@media(max-width:700px){
  .art-wrap{padding:calc(64px + env(safe-area-inset-top)) 10px calc(40px + env(safe-area-inset-bottom));display:block;overflow-y:auto}
  .topbar a{max-width:48%;font-size:11px;padding:9px 10px}
  .art-link{width:100%;height:auto;min-height:0;aspect-ratio:2262/1254;border-radius:18px;overflow:hidden;margin:0 auto;box-shadow:0 0 28px rgba(34,211,238,.14)}
  .art-link img{position:static;object-fit:contain;background:#05070b}
}
@media(max-width:390px){.art-wrap{padding-left:8px;padding-right:8px}.art-link{border-radius:14px}}
</style>
</head>
<body>
<main class="page">
  <nav class="topbar" aria-label="Launchpad navigation"><a href="index.html">← Mission Control</a><a href="index.html?launchpad=skip">Skip to Mission Control</a></nav>
  <section class="art-wrap" aria-label="Welcome to Launchpad">
    <a class="art-link" href="launchpad-path.html?v=safety-check-20260517" aria-label="Choose your Launchpad setup path">
      <img src="assets/onboarding/launchpad-start-clean-20260517.png" alt="Welcome to Launchpad. Step 1 of 6: Set up your agent. Let’s get started." />
    </a>
  </section>
</main>
</body>
</html>
