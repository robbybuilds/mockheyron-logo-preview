<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heyron Launchpad, Gold Refresh</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-page: #0A0A0A;
  --bg-panel: #14171C;
  --bg-panel-2: #1A1E25;
  --border-muted: #2D333B;
  --border-strong: #3D434B;
  --brand-primary: #273957;
  --brand-secondary: #546E8F;
  --accent: #546E8F;
  --accent-soft: rgba(84,110,143,0.12);
  --accent-edge: rgba(84,110,143,0.50);
  /* Robin / light blue accents, additive to navy, for warmth and lift */
  --robin: #8FD3F4;           /* light robin blue, brighter so it reads as blue not periwinkle */
  --robin-soft: rgba(143,211,244,0.14);
  --robin-edge: rgba(143,211,244,0.55);
  --sky: #BDE3F4;             /* softer sky for highlights */
  --sky-soft: rgba(189,227,244,0.10);
  --text-primary: #F5F5F5;
  --text-secondary: #8B9CB5;
  --text-tertiary: #6E7E94;
  --text-on-accent: #FFFFFF;
  --status-success: #34D399;
  --status-warning: #F59E0B;
  --status-error: #DC2626;
  --danger-bg: rgba(220,38,38,0.10);
  --danger-edge: rgba(220,38,38,0.40);
  --danger-text: #FCA5A5;
  --r-sm: 8px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.20);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.30);
  --shadow-lg: 0 16px 40px rgba(0,0,0,0.40);
}
/* Keep page background dark so the light panel pops on top of it */
html, body { background: #0A0A0A; }
.pill { background: var(--robin-soft); border-color: var(--robin-edge); color: var(--robin); }
.card.recommended { border-color: var(--robin); box-shadow: 0 0 0 1px rgba(127,198,230,0.15), 0 8px 24px rgba(127,198,230,0.08); }
.integration.connected { border-color: var(--robin); background: rgba(127,198,230,0.04); }
.integration.connected .usecase-check { background: var(--robin); border-color: var(--robin); }
.usecase.selected { border-color: var(--robin); background: rgba(127,198,230,0.04); }
.usecase.selected .usecase-check { background: var(--robin); border-color: var(--robin); }
.option.selected { border-color: var(--robin); background: rgba(127,198,230,0.04); }
.option.selected .option-mark { border-color: var(--robin); }
.option.selected .option-mark::after { background: var(--robin); }
.chip.selected { border-color: var(--robin); color: var(--robin); background: var(--robin-soft); }
.voice.selected { border-color: var(--robin); background: rgba(127,198,230,0.04); }
.step.active { background: var(--robin); }
.step.done { background: var(--robin); opacity: 0.4; }
.toggle.on { background: var(--robin); }
.soul-note { background: var(--robin-soft); border-color: var(--robin-edge); color: var(--robin); }
.soul-note strong { color: var(--text-primary); }
.metric-trend { color: var(--robin) !important; }
/* Headline stays cool-white */
h1.headline { color: #F5F5F5; }

/* Brand now shows a mini Ron head, bring it in line */
.brand { gap: 8px; align-items: center; }
.brand-name { letter-spacing: -0.008em; }

/* Ron companion bubble, his little voice next to the progress bar */
.ron-companion { display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin: -14px 0 22px; background: var(--robin-soft); border: 0.5px solid var(--robin-edge); border-radius: var(--r-lg); font-size: 13px; color: var(--robin); line-height: 1.5; animation: ron-fade-in 260ms ease-out; box-shadow: 0 4px 16px rgba(143,211,244,0.08); }
.ron-companion span { color: var(--text-primary); opacity: 0.95; font-weight: 400; }
@keyframes ron-fade-in { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }

/* Active step dot gets a subtle glow so progress feels alive */
.step.active { background: var(--robin); box-shadow: 0 0 12px rgba(127,198,230,0.50); }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-page); color: var(--text-primary);
  font-family: 'DM Sans', 'Commissioner', system-ui, -apple-system, sans-serif;
  font-feature-settings: 'ss01','kern','liga'; font-optical-sizing: auto;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility; line-height: 1.5; min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
code { font-family: 'JetBrains Mono', SFMono-Regular, Menlo, monospace; font-size: 0.9em; background: var(--bg-panel-2); padding: 1px 6px; border-radius: 4px; color: var(--brand-secondary); }
h1, h2, h3, h4 { letter-spacing: -0.018em; }
.metric-value, .container-meta-value, code, input[type="time"] { font-variant-numeric: tabular-nums; }
button, a { transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease; }
button:focus-visible, .input:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 2px solid var(--brand-secondary); outline-offset: 2px; }
::selection { background: var(--accent-soft); color: var(--text-primary); }

.app { max-width: 720px; margin: 0 auto; padding: 32px 16px 120px; min-height: 100vh; position: relative; }
.placeholder-note { background: var(--accent-soft); border: 0.5px dashed var(--accent-edge); border-radius: var(--r-md); padding: 10px 14px; font-size: 12px; color: var(--brand-secondary); margin-bottom: 16px; line-height: 1.5; }
.panel { border: 0.5px solid var(--border-muted); border-radius: var(--r-xl); padding: 32px 28px 24px; background: linear-gradient(180deg, rgba(20,23,28,0.4) 0%, rgba(10,10,10,0) 100%); }

.brand { display: flex; align-items: center; gap: 7px; margin-bottom: 24px; }
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.012em; }
.brand-dot { display: inline-block; width: 5px; height: 5px; background: var(--brand-secondary); border-radius: 50%; }

h1.headline { font-size: 28px; font-weight: 500; line-height: 1.18; letter-spacing: -0.024em; margin-bottom: 10px; }
p.sub { font-size: 15px; color: var(--text-secondary); line-height: 1.55; }
.hero { display: flex; align-items: center; gap: 24px; margin-bottom: 28px; }
.hero-text { flex: 1; }

.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 20px; display: flex; flex-direction: column; }
.card.recommended { border: 1px solid var(--brand-secondary); }
.card-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
.card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 18px; flex: 1; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: var(--r-md); border: none; width: 100%; }
.btn-primary { background: var(--brand-secondary); color: var(--text-on-accent); }
.btn-primary:hover:not(:disabled) { background: #607D9F; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(84,110,143,0.30); }
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-ghost { background: transparent; color: var(--text-primary); border: 0.5px solid var(--border-strong); }
.btn-ghost:hover { background: var(--bg-panel-2); border-color: var(--accent-edge); }
.btn-link { background: transparent; color: var(--brand-secondary); padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--accent-edge); border-radius: var(--r-sm); width: auto; }
.btn-link:hover { background: var(--accent-soft); }
.btn-text { background: transparent; color: var(--brand-secondary); border: none; padding: 6px 8px; width: auto; font-size: 13px; font-weight: 500; }
.btn-text:hover { color: var(--text-primary); }
.btn-sm { padding: 8px 14px; font-size: 12px; width: auto; flex-shrink: 0; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.pill { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 0.5px solid var(--accent-edge); color: var(--brand-secondary); font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; margin-bottom: 14px; align-self: flex-start; }
.pill-spacer { height: 22px; margin-bottom: 14px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.field-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; line-height: 1.5; }
.input { width: 100%; padding: 10px 12px; background: var(--bg-panel); color: var(--text-primary); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); font-size: 14px; outline: none; transition: border-color 120ms ease, box-shadow 120ms ease; }
.input:focus { border-color: var(--brand-secondary); box-shadow: 0 0 0 2px var(--accent-edge); }
textarea.input { resize: vertical; min-height: 80px; line-height: 1.55; }
select.input { appearance: none; -webkit-appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--text-secondary) 50%), linear-gradient(135deg, var(--text-secondary) 50%, transparent 50%); background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 32px; }

.foot { font-size: 12px; color: var(--text-tertiary); text-align: center; margin-top: 20px; }
.steps { display: flex; gap: 4px; margin-bottom: 24px; }
.step { flex: 1; height: 3px; background: var(--border-muted); border-radius: 2px; transition: background 200ms; }
.step.active { background: var(--brand-secondary); }
.step.done { background: var(--brand-secondary); opacity: 0.4; }

.options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.options-rich { grid-template-columns: 1fr 1fr; gap: 10px; }
.option { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 16px; cursor: pointer; transition: border-color 140ms; text-align: left; color: inherit; }
.option:hover { border-color: var(--border-strong); }
.option.selected { border: 1px solid var(--brand-secondary); }
.option-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.option-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
.option-tag { font-size: 10px; color: var(--brand-secondary); background: var(--accent-soft); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.options-list .option { display: flex; gap: 12px; align-items: center; }
.options-list .option-body { flex: 1; }
.option-mark { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border-strong); flex-shrink: 0; position: relative; transition: border-color 140ms; }
.options-list .option.selected .option-mark { border-color: var(--brand-secondary); }
.options-list .option.selected .option-mark::after { content: ''; position: absolute; inset: 4px; background: var(--brand-secondary); border-radius: 50%; }

.persona-card { padding: 18px; }
.persona-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.persona-tag { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.persona-sample { font-size: 12px; color: var(--text-primary); background: var(--bg-panel-2); padding: 10px 12px; border-radius: var(--r-sm); margin-bottom: 10px; line-height: 1.55; font-style: italic; border-left: 2px solid var(--brand-secondary); }
.persona-best { font-size: 11px; color: var(--text-tertiary); }
.persona-best strong { color: var(--text-secondary); font-weight: 500; }
.comm-sample { font-size: 13px; color: var(--text-primary); background: var(--bg-panel-2); padding: 10px 12px; border-radius: var(--r-sm); margin-top: 10px; line-height: 1.55; font-style: italic; border-left: 2px solid var(--brand-secondary); }

.usecase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.usecase { display: flex; align-items: center; gap: 10px; background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); padding: 12px; cursor: pointer; color: inherit; text-align: left; transition: border-color 140ms; width: 100%; }
.usecase:hover { border-color: var(--border-strong); }
.usecase.selected { border-color: var(--brand-secondary); }
.usecase-check { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border-strong); flex-shrink: 0; position: relative; transition: all 140ms; }
.usecase.selected .usecase-check { background: var(--brand-secondary); border-color: var(--brand-secondary); }
.usecase.selected .usecase-check::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: 2px solid #FFFFFF; border-top: 0; border-left: 0; transform: rotate(45deg); }
.usecase-label { font-size: 13px; flex: 1; }

.soul-note { background: var(--accent-soft); border: 0.5px solid var(--accent-edge); border-radius: var(--r-md); padding: 12px 14px; margin-top: 18px; font-size: 12px; color: var(--brand-secondary); line-height: 1.6; }
.soul-note strong { color: var(--text-primary); font-weight: 500; }
.danger-note { background: var(--danger-bg); border: 0.5px solid var(--danger-edge); border-radius: var(--r-md); padding: 12px 14px; font-size: 12px; color: var(--danger-text); line-height: 1.6; }
.danger-note strong { color: var(--text-primary); font-weight: 500; display: block; margin-bottom: 4px; }
.danger-note ul { margin: 6px 0 0; padding-left: 16px; }
.danger-note li { margin-bottom: 3px; }

.actions { display: flex; gap: 12px; margin-top: 28px; align-items: center; }
.actions .btn { flex: 1; }
.actions .btn-back, .actions .btn-skip { flex: 0 0 auto; width: auto; padding: 10px 18px; }

.setup { background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-lg); padding: 18px; }
.setup-step { display: flex; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid var(--border-muted); }
.setup-step:last-child { border-bottom: 0; padding-bottom: 0; }
.setup-step:first-child { padding-top: 0; }
.setup-num { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-panel-2); color: var(--text-secondary); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 200ms; }
.setup-step.done .setup-num { background: var(--brand-secondary); color: var(--text-on-accent); }
.setup-step-body { flex: 1; min-width: 0; }
.setup-step-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.setup-step-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.setup-step-action { margin-top: 10px; }
.setup-cta { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 18px; font-size: 14px; font-weight: 500; border-radius: var(--r-md); width: 100%; background: var(--bg-panel-2); color: var(--text-primary); border: 0.5px solid var(--border-strong); cursor: pointer; transition: all 140ms; }
.setup-cta:hover { border-color: var(--accent-edge); background: var(--bg-panel); }
.setup-cta:disabled { opacity: 0.5; cursor: not-allowed; }
.setup-status { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: var(--accent-soft); border: 0.5px solid var(--accent-edge); border-radius: var(--r-md); font-size: 13px; color: var(--brand-secondary); }

.voice-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.voice { padding: 12px; background: var(--bg-page); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); cursor: pointer; text-align: left; color: inherit; transition: border-color 140ms; }
.voice:hover { border-color: var(--border-strong); }
.voice.selected { border-color: var(--brand-secondary); }
.voice-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.voice-desc { font-size: 11px; color: var(--text-tertiary); }
.permissions { display: flex; flex-direction: column; gap: 0; }
.permissions .toggle-row { padding: 12px 0; }
.permissions .toggle-row:first-child { padding-top: 4px; }
.permissions .toggle-row:last-child { padding-bottom: 4px; }
.skip-hint { font-size: 12px; color: var(--text-tertiary); text-align: center; margin-top: 14px; }

.integrations { display: flex; flex-direction: column; gap: 8px; }
.integration { display: flex; align-items: center; gap: 12px; background: var(--bg-panel); border: 0.5px solid var(--border-muted); border-radius: var(--r-md); padding: 14px; transition: border-color 140ms, transform 100ms, background 140ms; cursor: pointer; text-align: left; color: inherit; width: 100%; }
.integration:hover { border-color: var(--border-strong); }
.integration:active { transform: scale(0.99); }
.integration.connected { border-color: var(--brand-secondary); background: rgba(84,110,143,0.05); }
.integration.connected .usecase-check { background: var(--brand-secondary); border-color: var(--brand-secondary); }
.integration.connected .usecase-check::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: 2px solid #FFFFFF; border-top: 0; border-left: 0; transform: rotate(45deg); }
.card { transition: transform 100ms, border-color 140ms; }
.card:active { transform: scale(0.995); }
/* ── GLOBAL LIGHT-BOX STYLE ──
   Every content card/panel/box gets: dark blue frame, lighter-blue interior, near-black text.
   Applied late so it overrides the earlier dark theme for content areas.
   Page background stays subtly dark, only the content boxes are light. */

/* Panels (every screen's main container) */
.panel {
  background: linear-gradient(180deg, #EAF4FB 0%, #D8E8F3 100%) !important;
  border: 2px solid #1E3A5F !important;
  box-shadow: 0 0 0 3px rgba(143,211,244,0.25), 0 18px 48px rgba(30,58,95,0.35) !important;
  color: #0A1220 !important;
}

/* All headings/body text inside panels goes dark */
.panel h1, .panel h2, .panel h3, .panel h4, .panel p, .panel span, .panel label, .panel li,
.panel .summary-label, .panel .summary-value,
.panel .field-hint, .panel .foot, .panel .skip-hint, .panel .about-note {
  color: #0A1220 !important;
}
.panel h1.headline { color: #0A1220 !important; background: none !important; -webkit-text-fill-color: initial !important; }
.panel .sub { color: #2C4A6E !important; }

/* Brand wordmark dark */
.panel .brand-name { color: #0A1220 !important; }
.panel .brand-dot { background: #1E3A5F !important; }

/* Step progress, dark blue trail */
.panel .steps .step { background: rgba(30,58,95,0.18) !important; }
.panel .steps .step.active { background: #1E3A5F !important; box-shadow: 0 0 10px rgba(30,58,95,0.45) !important; }
.panel .steps .step.done { background: #1E3A5F !important; opacity: 0.55; }

/* Inner cards (Beginner, Expert, Remix in welcome; integration cards; setup rows) */
.panel .card {
  background: #FFFFFF !important;
  border: 1.5px solid #1E3A5F !important;
  color: #0A1220 !important;
  box-shadow: 0 2px 8px rgba(30,58,95,0.10) !important;
}
.panel .card-title { color: #0A1220 !important; font-weight: 600 !important; }
.panel .card-desc { color: #2C4A6E !important; opacity: 1 !important; }

/* Primary CTA inside panels: dark navy */
.panel .btn-primary {
  background: #1E3A5F !important;
  color: #FFFFFF !important;
  border: none !important;
}
.panel .btn-primary:hover:not(:disabled) { background: #274D7E !important; box-shadow: 0 6px 16px rgba(30,58,95,0.35) !important; }

/* Ghost buttons inside panels: light fill, dark frame */
.panel .btn-ghost {
  background: transparent !important;
  color: #1E3A5F !important;
  border: 1.5px solid #1E3A5F !important;
}
.panel .btn-ghost:hover:not(:disabled) { background: rgba(30,58,95,0.08) !important; }
.panel .btn-text { color: #1E3A5F !important; }
.panel .btn-link { color: #1E3A5F !important; border-color: #1E3A5F !important; }

/* Recommended pill */
.panel .pill { background: #1E3A5F !important; color: #EAF4FB !important; border: none !important; }

/* Recommended card gets an extra accent halo */
.panel .card.recommended {
  background: #FFFFFF !important;
  border: 2px solid #1E3A5F !important;
  box-shadow: 0 0 0 3px rgba(143,211,244,0.45), 0 12px 32px rgba(30,58,95,0.20) !important;
}

/* Remix card, titles now match the other cards (dark like them) */
.remix-card {
  background: linear-gradient(180deg, #FFFFFF 0%, #EAF4FB 100%) !important;
  border: 2px solid #1E3A5F !important;
  box-shadow: 0 0 0 3px rgba(143,211,244,0.45), 0 14px 40px rgba(30,58,95,0.25) !important;
  color: #0A1220 !important;
}
.remix-card .card-title { color: #0A1220 !important; font-weight: 600 !important; }
.remix-card .card-desc { color: #2C4A6E !important; opacity: 1 !important; }
.remix-btn { background: #1E3A5F !important; color: #FFFFFF !important; border: none !important; font-weight: 500 !important; }
.remix-btn:hover:not(:disabled) { background: #274D7E !important; box-shadow: 0 6px 16px rgba(30,58,95,0.35) !important; transform: translateY(-1px); }

/* Integration tiles in the picker */
.panel .integration {
  background: #FFFFFF !important;
  border: 1.5px solid #1E3A5F !important;
  color: #0A1220 !important;
}
.panel .integration:hover { border-color: #274D7E !important; box-shadow: 0 4px 12px rgba(30,58,95,0.12) !important; }
.panel .integration.connected {
  background: #EAF4FB !important;
  border-color: #1E3A5F !important;
  box-shadow: 0 0 0 2px rgba(30,58,95,0.35) !important;
}
.panel .integration-name { color: #0A1220 !important; }
.panel .integration-desc { color: #0A1220 !important; }
.panel .integration-why { color: #2C4A6E !important; }
.panel .integration-need { background: #D8E8F3 !important; border-left: 2px solid #1E3A5F !important; color: #0A1220 !important; }
.panel .integration-need strong { color: #1E3A5F !important; }
.panel .integration-icon {
  background: #1E3A5F !important;

/* BYOK. Bring your own model key */
function BYOKSetup({ data, onUpdate, onNext, onBack, step, totalSteps }) {
  const [provider, setProvider] = useState(data.byokProvider || null);
  const [apiKey, setApiKey] = useState(data.byokKey || '');
  const [tested, setTested] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testError, setTestError] = useState(null);
  const PROVIDERS = [
    { id: 'openrouter', name: 'OpenRouter', desc: 'Unified access to most models.' },
    { id: 'anthropic', name: 'Anthropic', desc: 'Direct Claude API.' },
    { id: 'openai', name: 'OpenAI', desc: 'Direct GPT-4/5 API.' },
  ];
  const valid = provider && apiKey.length >= 20 && tested;
  const test = async () => {
    setTesting(true); setTestError(null); setTested(false);
    if (window.HeyronLaunchpad?.validateIntegration && provider === 'openrouter') {
      const res = await window.HeyronLaunchpad.validateIntegration('openrouter', { apiKey });
      if (res?.ok) setTested(true); else setTestError(res?.error || 'Key rejected');
    } else { setTested(true); }
    setTesting(false);
  };
  const handleConnect = () => {
    if (window.HeyronLaunchpad?.saveIntegrationCredential) window.HeyronLaunchpad.saveIntegrationCredential('byok', { apiKey, provider }, {});
    onUpdate({ tools: Array.from(new Set([...data.tools, 'byok'])), byokProvider: provider, byokKey: '\u2022\u2022\u2022\u2022\u2022\u2022' });
    onNext();
  };
  return (
    <IntegrationStep name="Your own key (BYOK)" desc="Use your own OpenRouter / Anthropic / OpenAI key instead of Heyron's managed billing." step={step} totalSteps={totalSteps} onBack={onBack} onSkip={onNext} onConnect={handleConnect} connected={data.tools.includes('byok')} canConnect={valid}>
      <div className="setup">
        <SetupRow num="1" title="Pick your provider" done={!!provider}>
          <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>{PROVIDERS.map(p => (
            <button key={p.id} className={`option ${provider === p.id ? 'selected' : ''}`} onClick={() => { setProvider(p.id); setTested(false); }} style={{display: 'flex', gap: 12, alignItems: 'center'}}><div className="option-mark" /><div className="option-body"><p className="option-title">{p.name}</p><p className="option-desc">{p.desc}</p></div></button>
          ))}</div>
        </SetupRow>
        {provider && <SetupRow num="2" title="Paste your API key" done={apiKey.length >= 20}>
          <div className="danger-note" style={{ marginBottom: 12 }}><strong>Protect this key.</strong><ul><li>Charges go to YOUR account at {PROVIDERS.find(p => p.id === provider)?.name}.</li><li>Never share in screenshots, chat logs, or public repos.</li><li>Rotate it in the provider dashboard if leaked.</li></ul></div>
          <input className="input" type="password" value={apiKey} onChange={(e) => { setApiKey(e.target.value); setTested(false); }} placeholder={provider === 'openrouter' ? 'sk-or-v1-...' : provider === 'anthropic' ? 'sk-ant-...' : 'sk-...'} style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 13 }} />
        </SetupRow>}
        {apiKey.length >= 20 && <SetupRow num="3" title="Verify the key" done={tested}>{tested ? <StatusOK>Key accepted.</StatusOK> : <button className="setup-cta" onClick={test} disabled={testing}>{testing ? 'Testing\u2026' : 'Test connection'}</button>}{testError && <p className="field-hint" style={{ color: 'var(--status-error)', marginTop: 8 }}>{testError}</p>}</SetupRow>}
      </div>
    </IntegrationStep>
  );
}

      {page.sections.map((s, i) => (<div key={i} className="help-section"><h3>{s.h}</h3>{s.body && <p>{s.body}</p>}{s.steps && <ol>{s.steps.map((l, j) => <li key={j}>{l}</li>)}</ol>}{s.list && <ul>{s.list.map((l, j) => <li key={j}>{l}</li>)}</ul>}</div>))}
      <div className="help-cta"><span className="help-cta-text">Still need a hand? Ron can dig into your container.</span><button className="btn btn-primary" style={{ width: 'auto', padding: '8px 14px', fontSize: 12 }} onClick={onBack}>Ask Ron</button></div>
      {page.related?.length > 0 && <div className="help-cta" style={{ marginTop: 8, flexDirection: 'column', alignItems: 'stretch' }}><div className="help-cta-text" style={{ marginBottom: 8 }}>Related</div>{page.related.filter(rs => HELP_PAGES[rs]).map(rs => (<button key={rs} className="btn btn-ghost" style={{ padding: '8px 12px', fontSize: 13, marginBottom: 4, justifyContent: 'flex-start' }} onClick={() => onSelect(rs)}>{HELP_PAGES[rs].title} →</button>))}</div>}
    </div>
  );
}

/* ─── Hey Ron, dual-mode support widget ─────────────────────────── */
const ESCALATE_KEYWORDS = ['billing','refund','cancel','outage','data loss','security','breach','urgent','emergency','production down','human','support team','real person','locked out'];
const TOOL_LABELS = { github: 'GitHub', telegram: 'Telegram', apify: 'Apify', elevenlabs: 'ElevenLabs', obsidian: 'Obsidian', cron: 'Cron', browser: 'Web Browser' };
function buildFAQ(data, mode) {
  const tools = data.tools || [];
  const installedList = tools.length ? tools.map(t => TOOL_LABELS[t] || t).join(', ') : 'nothing yet';
  const gated = mode === 'public';
  const verify = { reply: "For that I need to verify you. Sign in, or I can still help with docs, tickets, or ticket status.", action: { type: 'link', url: '/signin', label: 'Sign in →' } };
  return [
    { match: /(what|which).{0,30}(installed|connected|integration)|installed|integrations? do I have/i, reply: gated ? verify.reply : (tools.length ? `Looking at your container, ${tools.length} active: ${installedList}. Want a status check on any?` : 'No integrations connected yet. Settings → Connections.'), action: gated ? verify.action : undefined, investigate: !gated },
    { match: /cancel.{0,30}(account|subscription|plan)?|how (do|can) I cancel|delete my account/i, reply: "Sad to see you go. Here's how cancellation works.", action: { type: 'help', slug: 'cancel', label: 'Open cancellation guide →' } },
    { match: /refund|money back|charge back/i, reply: "Refund requests go through a tracked form. Here's the guide.", action: { type: 'help', slug: 'refund', label: 'Open refund guide →' } },
    { match: /log|crash|broken|not working|error|stuck|failed/i, reply: gated ? "Tell me what error you're seeing. For deeper log checks I'd need your account, or I can open a ticket." : "Checking your container... agent process restarted twice. Rate-limit pressure on one of your integrations. I've backed off the polling. Want the troubleshooting guide?", investigate: !gated, action: { type: 'help', slug: 'troubleshooting', label: 'Open troubleshooting guide →' } },
    { match: /can'?t (log ?in|sign ?in|access)|reset password|locked out|forgot password/i, reply: "Let's get you back in. Fastest path is a password reset link.", action: { type: 'link', url: '/reset-password', label: 'Reset password →' } },
    { match: /status|where.{0,10}ticket|check.{0,10}ticket/i, reply: gated ? "Sure. Paste your ticket number and the email you used." : "Let me pull your recent tickets.", action: { type: 'ticket-status', label: 'Check ticket status →' } },
    { match: /(what is|explain|tell me about) (the )?soul|soul vs memory/i, reply: "Soul is agent identity (focus, personality, voice). Memory is what it knows.", action: { type: 'help', slug: 'soul-memory', label: 'Read the breakdown →' } },
    { match: /container access|what.{0,15}(can|do).{0,15}(you|ron).{0,15}see/i, reply: "I can read integrations, logs, settings. Never your tokens or message content.", action: { type: 'help', slug: 'container-access', label: 'Full explanation →' } },
    { match: /personality|persona/i, reply: `Settings → Soul → Personality controls how ${data.agentName || 'your agent'} talks.${gated ? ' Sign in to change it.' : ''}` },
    { match: /(my )?identity|who.{0,15}(am I|are you)|(your|my) name|rename/i, reply: gated ? verify.reply : `Identity: you're ${data.yourName || 'not set'} and your agent is ${data.agentName || 'not set'}. Settings → Identity.`, action: gated ? verify.action : undefined },
    { match: /memory|forget|remember/i, reply: gated ? verify.reply : 'Memory holds facts and history. Settings → Memory, 142 entries stored.', action: gated ? verify.action : undefined, investigate: !gated },
    { match: /model|gpt|llm/i, reply: gated ? verify.reply : `Settings → Model. You're on ${(MODELS.find(m => m.id === data.model) || {}).name || 'Heyron Standard'}.`, action: gated ? verify.action : undefined },
    { match: /restart|reboot/i, reply: gated ? verify.reply : `Restarting ${data.agentName || 'your agent'} in the container now.`, investigate: !gated, action: gated ? verify.action : undefined },
    { match: /github/i, reply: gated ? 'GitHub setup covers OAuth and PAT options.' : (tools.includes('github') ? 'GitHub is live. Last sync 14 min ago.' : "GitHub isn't connected."), action: { type: 'help', slug: 'github', label: 'GitHub guide →' }, investigate: !gated && tools.includes('github') },
    { match: /telegram|botfather/i, reply: gated ? 'Telegram setup uses @BotFather.' : (tools.includes('telegram') ? 'Telegram is connected.' : "Telegram isn't connected yet."), action: { type: 'help', slug: 'telegram', label: 'Telegram guide →' } },
    { match: /discord/i, reply: 'Heyron Discord lives at discord.gg/heyron.', action: { type: 'link', url: 'https://discord.gg/heyron', label: 'Open invite →' } },
    { match: /apify|scrape/i, reply: gated ? 'Apify setup covers tokens.' : (tools.includes('apify') ? 'Apify token healthy.' : "Apify isn't connected."), action: { type: 'help', slug: 'apify', label: 'Apify guide →' } },
    { match: /elevenlabs|voice/i, reply: gated ? 'ElevenLabs setup covers API keys and voices.' : (tools.includes('elevenlabs') ? 'ElevenLabs is connected.' : "ElevenLabs isn't connected."), action: { type: 'help', slug: 'elevenlabs', label: 'ElevenLabs guide →' } },
    { match: /obsidian|vault/i, reply: gated ? 'Obsidian setup covers plugin install.' : (tools.includes('obsidian') ? 'Obsidian sync healthy.' : "Obsidian isn't connected."), action: { type: 'help', slug: 'obsidian', label: 'Obsidian guide →' } },
    { match: /cron|schedule task/i, reply: gated ? 'Cron setup covers scheduling.' : (tools.includes('cron') ? 'You have 1 cron job running.' : 'No scheduled tasks yet.'), action: { type: 'help', slug: 'cron', label: 'Cron guide →' } },
    { match: /browser|web browser/i, reply: gated ? 'Browser tool guide covers tiers.' : (tools.includes('browser') ? 'Browser tool active.' : "Browser tool isn't enabled."), action: { type: 'help', slug: 'browser', label: 'Browser guide →' } },
    { match: /^\s*(hello|hi|hey|sup|yo)\s*[!.?]?\s*$/i, reply: mode === 'authenticated' ? `Hey ${data.yourName || 'there'}! I've got your container open. What's up?` : "Hey! I'm Ron, I can help with docs, tickets, or ticket status." },
  ];
}
function shouldEscalate(text, turnCount) { const lc = text.toLowerCase(); if (ESCALATE_KEYWORDS.some(k => lc.includes(k))) return true; if (turnCount >= 6) return true; return false; }
function findReply(text, faq) { const m = faq.find(f => f.match.test(text)); return m || { reply: "Hmm, not sure about that. Try rephrasing, or open a ticket." }; }
function getQuickActions(mode) {
  if (mode === 'authenticated') return [{ label: "What's installed?", text: 'What integrations do I have installed?' }, { label: 'Got an error', text: "I'm getting an error" }, { label: 'Check my tickets', kind: 'ticket-status' }, { label: 'Cancel my account', text: 'How do I cancel my account?' }, { label: 'Request a refund', text: 'I want to request a refund' }, { label: 'Open a ticket', kind: 'ticket' }];
  return [{ label: "I can't log in", text: "I can't log in" }, { label: 'Set up Telegram', text: 'How do I set up Telegram?' }, { label: 'Cancel my account', text: 'How do I cancel my account?' }, { label: 'Request a refund', text: 'I want to request a refund' }, { label: 'Check ticket status', kind: 'ticket-status' }, { label: 'Open a ticket', kind: 'ticket' }];
}

function SupportWidget({ mode = 'authenticated', userEmail, userData, onNavigateHelp, openSignal, pulse }) {
  const [open, setOpen] = useState(false);
  useEffect(() => { if (openSignal && openSignal > 0) setOpen(true); }, [openSignal]);
  const greeting = mode === 'authenticated'
    ? `${userData?.yourName ? `Hey ${userData.yourName}!` : 'Hey!'} I'm Ron, the support raccoon. I've got your container open, including ${userData?.agentName || 'your agent'}'s logs and integrations. What's up?`
    : "Hey! I'm Ron. I can help with docs, account stuff, and tickets. For container-specific help you'll need to sign in.";
  const [messages, setMessages] = useState([{ from: 'bot', text: greeting }]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [investigating, setInvestigating] = useState(false);
  const [escalateOffered, setEscalateOffered] = useState(false);
  const [showTicket, setShowTicket] = useState(false);
  const [showStatus, setShowStatus] = useState(false);
  const [toast, setToast] = useState(null);
  const messagesRef = useRef(null);
  useEffect(() => { if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight; }, [messages, typing, investigating]);
  const userTurns = messages.filter(m => m.from === 'user').length;
  const showQuick = userTurns === 0 && !typing && !investigating;
  const FAQ = buildFAQ(userData || {}, mode);
  const QUICK_ACTIONS = getQuickActions(mode);
  const send = (text) => {
    const userMsg = ((text !== undefined ? text : input) || '').trim();
    if (!userMsg) return;
    setMessages(m => [...m, { from: 'user', text: userMsg }]);
    if (text === undefined) setInput('');
    if (shouldEscalate(userMsg, userTurns + 1) && !escalateOffered) {
      setTyping(true);
      setTimeout(() => { setTyping(false); setMessages(m => [...m, { from: 'bot', text: 'This one needs the team. Let me hand you off.' }, { from: 'bot', kind: 'action', action: { type: 'ticket', label: 'Open a ticket →' } }]); setEscalateOffered(true); }, 700);
      return;
    }
    const found = findReply(userMsg, FAQ);
    const showReply = () => { const next = [{ from: 'bot', text: found.reply }]; if (found.action) next.push({ from: 'bot', kind: 'action', action: found.action }); setMessages(m => [...m, ...next]); };
    // If Ron's built-in FAQ didn't have a confident answer, fall through to the LLM backend.
    // Any confident FAQ match still wins, this is only for the generic 'not sure' fallback.
    const isGenericFallback = /not sure about that/i.test(found.reply);
    if (isGenericFallback && window.HeyronLaunchpad?.callRonChat) {
      setTyping(true);
      const history = messages.filter(m => m.from && m.text).slice(-10).map(m => ({ role: m.from === 'user' ? 'user' : 'assistant', content: m.text }));
      history.push({ role: 'user', content: userMsg });
      window.HeyronLaunchpad.callRonChat({ mode, userContext: userData || {}, messages: history }).then((res) => {
        setTyping(false);
        if (res?.reply) {
          const next = [{ from: 'bot', text: res.reply }];
          if (res.action) next.push({ from: 'bot', kind: 'action', action: res.action });
          setMessages(m => [...m, ...next]);
        } else { showReply(); }
      }).catch(() => { setTyping(false); showReply(); });
      return;
    }
    if (found.investigate) { setInvestigating(true); setTimeout(() => { setInvestigating(false); setTyping(true); setTimeout(() => { setTyping(false); showReply(); }, 600); }, 1100); }
    else { setTyping(true); setTimeout(() => { setTyping(false); showReply(); }, 700 + Math.random() * 300); }
  };
  const handleQuick = (qa) => { if (qa.kind === 'ticket') { setShowTicket(true); return; } if (qa.kind === 'ticket-status') { setShowStatus(true); return; } send(qa.text); };
  const handleAction = (action) => {
    if (action.type === 'link') window.open(action.url, '_blank', 'noopener');
    else if (action.type === 'ticket') setShowTicket(true);
    else if (action.type === 'ticket-status') setShowStatus(true);
    else if (action.type === 'help' && onNavigateHelp) { onNavigateHelp(action.slug); setOpen(false); }
  };
  const submitTicket = async (ticket) => {
    let id = Math.floor(1000 + Math.random() * 9000);
    if (window.HeyronLaunchpad?.submitTicket) {
      try { const r = await window.HeyronLaunchpad.submitTicket(ticket, userData); if (r?.ok && r.ticketNumber) id = r.ticketNumber; } catch {}
    }
    setShowTicket(false);
    setToast(`Ticket #${id} sent.`);
    setMessages(m => [...m, { from: 'bot', text: `Ticket #${id} is in. ${mode === 'authenticated' ? 'Snapshot attached. ' : ''}We'll email you within a day.` }]);
    setTimeout(() => setToast(null), 4000);
  };
  if (!open) return <button className={`sw-pill ${pulse ? 'glow' : ''}`} onClick={() => setOpen(true)} aria-label="Open support"><HeadMascot size={32} /></button>;
  return (
    <>
      <div className="sw-panel" role="dialog">
        <div className="sw-header"><div className="sw-header-info"><HeadMascot size={26} /><div><p className="sw-header-name">Hey Ron</p><p className="sw-header-status"><span className="sw-status-dot" /> {mode === 'public' ? 'Public support' : 'Online · container linked'}</p></div></div><button className="sw-close" onClick={() => setOpen(false)}>×</button></div>
        <div className="sw-messages" ref={messagesRef} aria-live="polite">
          {messages.map((m, i) => { if (m.kind === 'action') return <button key={i} className="sw-action-btn" onClick={() => handleAction(m.action)}>{m.action.label}</button>; return <div key={i} className={`bubble ${m.from}`}>{m.text}</div>; })}
          {investigating && <div className="investigating">Checking your container…</div>}
          {typing && <div className="typing"><span className="typing-dot" /><span className="typing-dot" /><span className="typing-dot" /></div>}
          {showQuick && <div className="sw-quick">{QUICK_ACTIONS.map((qa, i) => (<button key={i} className="sw-chip" onClick={() => handleQuick(qa)}>{qa.label}</button>))}</div>}
        </div>
        <div className="sw-input-row"><input className="input" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && send()} placeholder="Ask anything…" /><button className="sw-send" onClick={() => send()} disabled={!input.trim()}>Send</button></div>
      </div>
      {showTicket && <TicketModal mode={mode} messages={messages} email={userEmail} userData={userData} onClose={() => setShowTicket(false)} onSubmit={submitTicket} />}
      {showStatus && <TicketStatusModal mode={mode} email={userEmail} onClose={() => setShowStatus(false)} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}
function TicketModal({ mode, messages, email, userData, onClose, onSubmit }) {
  const transcript = messages.filter(m => m.from && m.text).map(m => `${m.from === 'user' ? 'User' : 'Ron'}: ${m.text}`).join('\n');
  const context = mode === 'authenticated' && userData ? `\nAgent: ${userData.agentName || '-'}\nIntegrations: ${(userData.tools || []).join(', ') || 'none'}` : '';
  const [subject, setSubject] = useState('');
  const [description, setDescription] = useState(`Conversation:\n${transcript}${context}\n\n---\n`);
  const [category, setCategory] = useState('Bug');
  const [priority, setPriority] = useState('normal');
  const [emailValue, setEmail] = useState(email || '');
  const valid = subject.trim() && description.trim() && emailValue.trim();
  const handleSubmit = () => { if (!valid) return; onSubmit({ subject, description, category, priority, email: emailValue, source: mode === 'authenticated' ? 'in_app_widget' : 'public_widget', containerSnapshot: mode === 'authenticated' }); };
  return (
    <div className="modal-backdrop" onClick={onClose}><div className="modal" onClick={(e) => e.stopPropagation()}>
      <h3>Open a ticket</h3>
      <p className="modal-sub">{mode === 'authenticated' ? 'Container snapshot auto-attached. Team will email within a day.' : "Tell us what happened, we'll reply within a day."}</p>
      <div className="field"><label>Subject</label><input className="input" value={subject} onChange={(e) => setSubject(e.target.value)} placeholder="Brief summary…" maxLength={100} autoFocus /></div>
      <div className="field"><label>Description</label><textarea className="input" value={description} onChange={(e) => setDescription(e.target.value)} rows={6} /></div>
      <div className="field"><label>Category</label><select className="input" value={category} onChange={(e) => setCategory(e.target.value)}><option>Account</option><option>Billing</option><option>Integration</option><option>Bug</option><option>Feature request</option><option>Other</option></select></div>
      <div className="field"><label>Priority</label><div className="chip-row">{['low','normal','urgent'].map(p => (<button key={p} className={`chip ${priority === p ? 'selected' : ''}`} onClick={() => setPriority(p)}>{p[0].toUpperCase() + p.slice(1)}</button>))}</div></div>
      <div className="field"><label>Email</label><input className="input" type="email" value={emailValue} onChange={(e) => setEmail(e.target.value)} /></div>
      <div className="actions"><button className="btn btn-ghost btn-back" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSubmit} disabled={!valid}>Send ticket</button></div>
    </div></div>
  );
}
function TicketStatusModal({ mode, email, onClose }) {
  const [ticketId, setTicketId] = useState('');
  const [emailValue, setEmail] = useState(email || '');
  const [result, setResult] = useState(null);
  const [looking, setLooking] = useState(false);
  const [error, setError] = useState(null);
  const valid = ticketId.trim() && emailValue.trim();
  const lookup = () => {
    if (!valid) return; setLooking(true); setError(null);
    setTimeout(() => {
      setLooking(false);
      const n = parseInt(ticketId, 10);
      if (isNaN(n) || n < 100) { setError("Couldn't find that ticket. Check the ID and email."); return; }
      const statuses = ['open', 'in_progress', 'waiting on you', 'resolved'];
      const status = statuses[n % 4];
      const summaries = { 'open': 'Received. Triage queue, assigning within 24h.', 'in_progress': 'Investigating. Should have an update soon.', 'waiting on you': 'Team asked a question, check your email.', 'resolved': 'Fixed. Reply if it happens again.' };
      setResult({ ticketId: ticketId.trim(), status, lastUpdated: '2h ago', summary: summaries[status] });
    }, 800);
  };
  return (
    <div className="modal-backdrop" onClick={onClose}><div className="modal" onClick={(e) => e.stopPropagation()}>
      <h3>Check ticket status</h3>
      <p className="modal-sub">{mode === 'authenticated' ? 'Enter a ticket number to look it up.' : 'Enter ticket number and the email you used so we can verify.'}</p>
      <div className="field"><label>Ticket number</label><input className="input" value={ticketId} onChange={(e) => setTicketId(e.target.value.replace(/[^0-9]/g, ''))} placeholder="4821" autoFocus /></div>
      <div className="field"><label>Email on file</label><input className="input" type="email" value={emailValue} onChange={(e) => setEmail(e.target.value)} /></div>
      {result && <div className="ticket-status-card"><h4>Ticket #{result.ticketId} · {result.status}</h4><p>{result.summary}</p><p className="ticket-status-card-time">Last update: {result.lastUpdated}</p></div>}
      {error && <p className="error-msg">{error}</p>}
      <div className="actions"><button className="btn btn-ghost btn-back" onClick={onClose}>Close</button><button className="btn btn-primary" onClick={lookup} disabled={!valid || looking}>{looking ? 'Looking up…' : 'Check status'}</button></div>
    </div></div>
  );
}

/* ─── App / router ──────────────────────────────────────────────── */
const INTEGRATION_TOOL_SLUGS = ['github','telegram','apify','elevenlabs','obsidian','cron','browser','composio','byok'];
const integrationFromScreen = (s) => INTEGRATION_TOOL_SLUGS.find(t => s === `beginner-${t}` || s === `expert-${t}`);
const BEGINNER_FLOW = ['beginner-names','beginner-usecases','beginner-pick-tools','beginner-github','beginner-telegram','beginner-apify','beginner-elevenlabs','beginner-obsidian','beginner-cron','beginner-browser','beginner-composio','beginner-byok','beginner-personality','beginner-comm','beginner-preview','beginner-about','beginner-disclaimer','beginner-finish'];
const EXPERT_FLOW = ['expert-names','expert-usecases','expert-model','expert-pick-tools','expert-github','expert-telegram','expert-apify','expert-elevenlabs','expert-obsidian','expert-cron','expert-browser','expert-composio','expert-byok','expert-memory','expert-personality','expert-comm','expert-hours','expert-notifications','expert-privacy','expert-preview','expert-about','expert-disclaimer','expert-finish'];
const INITIAL_DATA = { email: 'you@heyron.app', yourName: '', agentName: '', useCases: [], personality: null, commStyle: null, model: null, tools: [], toSetup: [], memory: null, editableMemory: true, timezone: 'Pacific (PT)', workStart: '09:00', workEnd: '18:00', workDays: ['Mon','Tue','Wed','Thu','Fri'], notifyEmail: true, notifyPush: false, notifyFreq: 'important', learnFromMe: true, shareUsage: true, autoDelete: 'Never', aboutYou: '' };

function App() {
  // Dev-only: ?screen=beginner-names etc. lets us deep-link into a specific screen for QA.
  // In production routing will gate entry; this has no effect on real users.
  // First-time users start on 'hello' (pure welcome). 'welcome' is the Launchpad path picker.
  const _initialScreen = (new URLSearchParams(window.location.search).get('screen')) || 'hello';
  const [screen, setScreen] = useState(_initialScreen);
  const [data, setData] = useState(INITIAL_DATA);
  const update = (patch) => setData((d) => ({ ...d, ...patch }));
  // Order tool-setup screens by the order the user picked them in (data.toSetup).
  // Non-tool screens (names, use cases, personality, preview, etc.) stay where they are.
  const orderFlow = (flow, prefix) => {
    const picks = data.toSetup || [];
    const toolScreens = picks.map(t => `${prefix}-${t}`).filter(s => flow.includes(s));
    const nonTool = flow.filter(s => !integrationFromScreen(s));
    const anchor = `${prefix}-pick-tools`;
    const anchorIdx = nonTool.indexOf(anchor);
    if (anchorIdx < 0) return [...nonTool, ...toolScreens];
    return [...nonTool.slice(0, anchorIdx + 1), ...toolScreens, ...nonTool.slice(anchorIdx + 1)];
  };
  const beginnerFlow = orderFlow(BEGINNER_FLOW, 'beginner');
  const expertFlow = orderFlow(EXPERT_FLOW, 'expert');
  const back = (current) => { const flow = current.startsWith('beginner-') ? beginnerFlow : current.startsWith('expert-') ? expertFlow : null; if (!flow) { setScreen('welcome'); return; } const idx = flow.indexOf(current); setScreen(idx <= 0 ? 'welcome' : flow[idx - 1]); };
  const advance = (current) => { const flow = current.startsWith('beginner-') ? beginnerFlow : expertFlow; const idx = flow.indexOf(current); setScreen(idx >= flow.length - 1 ? 'dashboard' : flow[idx + 1]); };
  const reset = () => { setData(INITIAL_DATA); setScreen('welcome'); };
  const stepB = (n) => beginnerFlow.indexOf(n);
  const stepE = (n) => expertFlow.indexOf(n);
  const totalB = beginnerFlow.length;
  const totalE = expertFlow.length;
  const renderTool = (prefix, tool, stepFn, total) => {
    const Comp = { github: GitHubSetup, telegram: TelegramSetup, apify: ApifySetup, elevenlabs: ElevenLabsSetup, obsidian: ObsidianSetup, cron: CronSetup, browser: BrowserSetup, composio: ComposioSetup, byok: BYOKSetup }[tool];
    const name = `${prefix}-${tool}`;
    return <Comp data={data} onUpdate={update} onBack={() => back(name)} onNext={() => advance(name)} step={stepFn(name)} totalSteps={total} />;
  };
  return (
    <div className="app">
      {screen === 'hello' && <HelloScreen data={data} onStart={() => setScreen('welcome')} />}
      {screen === 'welcome' && <LaunchpadWelcome data={data} onChoose={(p) => setScreen(p === 'beginner' ? 'beginner-names' : p === 'expert' ? 'expert-names' : 'beginner-pick-tools')} onBack={() => setScreen('hello')} />}
      {screen === 'beginner-names' && <NamesScreen data={data} onUpdate={update} onBack={() => back('beginner-names')} onNext={() => advance('beginner-names')} step={stepB('beginner-names')} totalSteps={totalB} />}
      {screen === 'beginner-usecases' && <UseCasesScreen data={data} onUpdate={update} onBack={() => back('beginner-usecases')} onNext={() => advance('beginner-usecases')} step={stepB('beginner-usecases')} totalSteps={totalB} />}
      {screen === 'beginner-pick-tools' && <IntegrationsPickScreen data={data} onUpdate={update} onBack={() => back('beginner-pick-tools')} onNext={() => advance('beginner-pick-tools')} step={stepB('beginner-pick-tools')} totalSteps={totalB} />}
      {INTEGRATION_TOOL_SLUGS.map(t => screen === `beginner-${t}` && <React.Fragment key={t}>{renderTool('beginner', t, stepB, totalB)}</React.Fragment>)}
      {screen === 'beginner-personality' && <PersonalityScreen data={data} onUpdate={update} onBack={() => back('beginner-personality')} onNext={() => advance('beginner-personality')} step={stepB('beginner-personality')} totalSteps={totalB} />}
      {screen === 'beginner-comm' && <CommStyleScreen data={data} onUpdate={update} onBack={() => back('beginner-comm')} onNext={() => advance('beginner-comm')} step={stepB('beginner-comm')} totalSteps={totalB} />}
      {screen === 'beginner-preview' && <PreviewScreen data={data} onLaunch={() => advance('beginner-preview')} onBack={() => back('beginner-preview')} step={stepB('beginner-preview')} totalSteps={totalB} expert={false} />}
      {screen === 'beginner-about' && <AboutYouScreen data={data} onUpdate={update} onNext={() => advance('beginner-about')} onBack={() => back('beginner-about')} step={stepB('beginner-about')} totalSteps={totalB} />}
      {screen === 'beginner-disclaimer' && <DisclaimerScreen data={data} onAccept={() => { if (window.HeyronLaunchpad?.saveAboutYou) window.HeyronLaunchpad.saveAboutYou(data.aboutYou || '', { yourName: data.yourName, agentName: data.agentName }); advance('beginner-disclaimer'); }} onBack={() => back('beginner-disclaimer')} step={stepB('beginner-disclaimer')} totalSteps={totalB} />}
      {screen === 'beginner-finish' && <FinishScreen data={data} onEnter={() => { if (window.HeyronLaunchpad?.save) window.HeyronLaunchpad.save(data); setScreen('dashboard'); }} onBack={() => back('beginner-finish')} onResumeLaunchpad={() => setScreen('beginner-pick-tools')} step={stepB('beginner-finish')} totalSteps={totalB} />}
      {screen === 'expert-names' && <NamesScreen data={data} onUpdate={update} onBack={() => back('expert-names')} onNext={() => advance('expert-names')} step={stepE('expert-names')} totalSteps={totalE} />}
      {screen === 'expert-usecases' && <UseCasesScreen data={data} onUpdate={update} onBack={() => back('expert-usecases')} onNext={() => advance('expert-usecases')} step={stepE('expert-usecases')} totalSteps={totalE} />}
      {screen === 'expert-model' && <ModelScreen data={data} onUpdate={update} onBack={() => back('expert-model')} onNext={() => advance('expert-model')} step={stepE('expert-model')} totalSteps={totalE} />}
      {screen === 'expert-pick-tools' && <IntegrationsPickScreen data={data} onUpdate={update} onBack={() => back('expert-pick-tools')} onNext={() => advance('expert-pick-tools')} step={stepE('expert-pick-tools')} totalSteps={totalE} />}
      {INTEGRATION_TOOL_SLUGS.map(t => screen === `expert-${t}` && <React.Fragment key={t}>{renderTool('expert', t, stepE, totalE)}</React.Fragment>)}
      {screen === 'expert-memory' && <MemoryScreen data={data} onUpdate={update} onBack={() => back('expert-memory')} onNext={() => advance('expert-memory')} step={stepE('expert-memory')} totalSteps={totalE} />}
      {screen === 'expert-personality' && <PersonalityScreen data={data} onUpdate={update} onBack={() => back('expert-personality')} onNext={() => advance('expert-personality')} step={stepE('expert-personality')} totalSteps={totalE} />}
      {screen === 'expert-comm' && <CommStyleScreen data={data} onUpdate={update} onBack={() => back('expert-comm')} onNext={() => advance('expert-comm')} step={stepE('expert-comm')} totalSteps={totalE} />}
      {screen === 'expert-hours' && <HoursScreen data={data} onUpdate={update} onBack={() => back('expert-hours')} onNext={() => advance('expert-hours')} step={stepE('expert-hours')} totalSteps={totalE} />}
      {screen === 'expert-notifications' && <NotificationsScreen data={data} onUpdate={update} onBack={() => back('expert-notifications')} onNext={() => advance('expert-notifications')} step={stepE('expert-notifications')} totalSteps={totalE} />}
      {screen === 'expert-privacy' && <PrivacyScreen data={data} onUpdate={update} onBack={() => back('expert-privacy')} onNext={() => advance('expert-privacy')} step={stepE('expert-privacy')} totalSteps={totalE} />}
      {screen === 'expert-preview' && <PreviewScreen data={data} onLaunch={() => advance('expert-preview')} onBack={() => back('expert-preview')} step={stepE('expert-preview')} totalSteps={totalE} expert={true} />}
      {screen === 'expert-about' && <AboutYouScreen data={data} onUpdate={update} onNext={() => advance('expert-about')} onBack={() => back('expert-about')} step={stepE('expert-about')} totalSteps={totalE} />}
      {screen === 'expert-disclaimer' && <DisclaimerScreen data={data} onAccept={() => { if (window.HeyronLaunchpad?.saveAboutYou) window.HeyronLaunchpad.saveAboutYou(data.aboutYou || '', { yourName: data.yourName, agentName: data.agentName }); advance('expert-disclaimer'); }} onBack={() => back('expert-disclaimer')} step={stepE('expert-disclaimer')} totalSteps={totalE} />}
      {screen === 'expert-finish' && <FinishScreen data={data} onEnter={() => { if (window.HeyronLaunchpad?.save) window.HeyronLaunchpad.save(data); setScreen('dashboard'); }} onBack={() => back('expert-finish')} onResumeLaunchpad={() => setScreen('expert-pick-tools')} step={stepE('expert-finish')} totalSteps={totalE} />}
      {screen === 'dashboard' && <Dashboard data={data} onReset={reset} onHelp={() => setScreen('help')} onNavigateHelp={(slug) => setScreen(`help-${slug}`)} onBackToLaunchpad={() => setScreen('beginner-pick-tools')} />}
      {screen === 'help' && <HelpIndex onSelect={(s) => setScreen(`help-${s}`)} onBack={() => setScreen('dashboard')} />}
      {screen.startsWith('help-') && <HelpPage slug={screen.replace('help-', '')} onSelect={(s) => setScreen(`help-${s}`)} onBack={() => setScreen('help')} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
