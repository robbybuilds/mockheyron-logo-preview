<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heyron Launchpad</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07090C;
  --text:#F5F0E8;
  --muted:#A1A1AA;
  --accent:#22D3EE;
  --gold:#D9A441;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text)}
.launchpad-welcome{position:relative;min-height:100vh;width:100%;overflow:hidden;background:#07090C;display:flex;align-items:stretch;justify-content:center}
.launchpad-art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
.launchpad-welcome::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(7,9,12,.12) 0%,rgba(7,9,12,0) 42%,rgba(7,9,12,.62) 100%),radial-gradient(circle at 50% 72%,rgba(34,211,238,.10),transparent 42%)}
.top-brand{position:absolute;z-index:2;top:22px;left:24px;display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid rgba(125,225,255,.22);border-radius:999px;background:rgba(7,9,12,.38);backdrop-filter:blur(10px);font-size:13px;color:rgba(245,240,232,.88)}
.top-brand img{width:24px;height:24px;border-radius:7px;object-fit:cover}
.launchpad-cta{position:absolute;z-index:3;left:50%;bottom:44px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:0 18px}
.launchpad-cta p{max-width:560px;color:rgba(245,240,232,.78);font-size:14px;line-height:1.5;text-shadow:0 2px 18px rgba(0,0,0,.7)}
.enter-button{display:inline-flex;align-items:center;justify-content:center;min-width:210px;padding:14px 22px;border-radius:999px;border:1px solid rgba(217,164,65,.68);background:linear-gradient(135deg,rgba(217,164,65,.92),rgba(34,211,238,.82));color:#071018;text-decoration:none;font-weight:700;font-size:14px;letter-spacing:.01em;box-shadow:0 0 28px rgba(217,164,65,.22),0 0 34px rgba(34,211,238,.16),inset 0 1px 0 rgba(255,255,255,.35);transition:transform .18s ease,box-shadow .18s ease}
.enter-button:hover{transform:translateY(-1px);box-shadow:0 0 34px rgba(217,164,65,.28),0 0 42px rgba(34,211,238,.20),inset 0 1px 0 rgba(255,255,255,.4)}
.secondary-link{color:rgba(245,240,232,.72);font-size:12px;text-decoration:none}
.secondary-link:hover{color:var(--accent)}
@media(max-width:760px){.launchpad-art{object-position:center top}.top-brand{top:14px;left:14px}.launchpad-cta{bottom:26px}.launchpad-cta p{font-size:13px}.enter-button{min-width:190px}}
</style>
</head>
<body>
<main class="launchpad-welcome" aria-label="Heyron Launchpad welcome">
  <img src="assets/final-onboarding-art.png" alt="Welcome to Heyron Launchpad" class="launchpad-art" />
  <div class="top-brand"><img src="assets/logo.png" alt="Heyron" /><span>Heyron Launchpad</span></div>
  <div class="launchpad-cta">
    <p>Welcome aboard. Step into Launchpad and choose how you want to set up your agent.</p>
    <a class="enter-button" href="launchpad-final.html?demo=1">Enter Launchpad</a>
    <a class="secondary-link" href="index.html">Back to Mission Control</a>
  </div>
</main>
</body>
</html>
